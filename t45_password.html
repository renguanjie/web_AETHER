<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>密码解锁告白</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: -apple-system, 'PingFang SC', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .lock-screen { text-align: center; }
        .lock-icon { font-size: 48px; margin-bottom: 20px; }
        .lock-title { font-size: 16px; color: #888; letter-spacing: 3px; margin-bottom: 30px; }
        .pin-dots { display: flex; gap: 16px; justify-content: center; margin-bottom: 30px; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #555; transition: all 0.2s ease; }
        .pin-dot.filled { background: #ff6b9d; border-color: #ff6b9d; box-shadow: 0 0 10px rgba(255,107,157,0.5); }
        .pin-dot.error { background: #f44336; border-color: #f44336; animation: shake 0.3s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .keypad { display: grid; grid-template-columns: repeat(3, 70px); gap: 12px; justify-content: center; }
        .key { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: inherit; transition: all 0.15s ease; }
        .key:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
        .key .sub { font-size: 8px; color: #555; letter-spacing: 2px; margin-top: 2px; }
        .hint { font-size: 11px; color: #444; margin-top: 24px; letter-spacing: 2px; }
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99)); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay-text { font-size: clamp(18px, 4vw, 28px); color: #fff; letter-spacing: 4px; text-align: center; opacity: 0; animation: rise 1.5s ease 0.5s forwards; }
        .overlay-text .pink { color: #ff6b9d; }
        .overlay-sub { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px; opacity: 0; animation: rise 1.5s ease 1.5s forwards; }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="lock-screen">
        <div class="lock-icon">&#128274;</div>
        <div class="lock-title">输入密码解锁告白</div>
        <div class="pin-dots" id="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="keypad" id="keypad">
            <button class="key" data-num="1">1</button>
            <button class="key" data-num="2">2<div class="sub">ABC</div></button>
            <button class="key" data-num="3">3<div class="sub">DEF</div></button>
            <button class="key" data-num="4">4<div class="sub">GHI</div></button>
            <button class="key" data-num="5">5<div class="sub">JKL</div></button>
            <button class="key" data-num="6">6<div class="sub">MNO</div></button>
            <button class="key" data-num="7">7<div class="sub">PQRS</div></button>
            <button class="key" data-num="8">8<div class="sub">TUV</div></button>
            <button class="key" data-num="9">9<div class="sub">WXYZ</div></button>
            <button class="key" data-num="0" style="grid-column:2">0</button>
        </div>
        <div class="hint">提示：一个特别的日子</div>
    </div>
    <div class="overlay" id="overlay">
        <div class="overlay-text">密码正确<br><span class="pink">告白已解锁：我喜欢你</span></div>
        <div class="overlay-sub">PASSWORD CORRECT — CONFESSION UNLOCKED</div>
    </div>
    <script>
        var PIN = '520', input = '';
        var dots = document.querySelectorAll('.pin-dot');
        document.getElementById('keypad').addEventListener('click', function(e) {
            var key = e.target.closest('.key'); if (!key) return;
            var num = key.getAttribute('data-num'); if (input.length >= 3) return;
            input += num; dots[input.length - 1].classList.add('filled');
            if (input.length === 3) {
                if (input === PIN) setTimeout(function() { document.getElementById('overlay').classList.add('visible'); }, 500);
                else { dots.forEach(function(d) { d.classList.remove('filled'); d.classList.add('error'); }); setTimeout(function() { dots.forEach(function(d) { d.classList.remove('error'); }); input = ''; }, 600); }
            }
        });
    </script>
</body>
</html>
