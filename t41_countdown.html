<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>倒计时告白</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: -apple-system, 'PingFang SC', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .countdown-label { font-size: 12px; color: #555; letter-spacing: 4px; margin-bottom: 20px; }
        .timer { display: flex; gap: clamp(12px, 3vw, 24px); margin-bottom: 30px; }
        .time-unit { text-align: center; }
        .time-value { font-size: clamp(36px, 10vw, 72px); font-weight: 200; font-variant-numeric: tabular-nums; min-width: 2ch; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 16px; }
        .time-label { font-size: 10px; color: #555; letter-spacing: 2px; margin-top: 8px; }
        .colon { font-size: clamp(36px, 10vw, 72px); color: #333; font-weight: 200; animation: blink 1s step-end infinite; align-self: flex-start; padding-top: 10px; }
        @keyframes blink { 50% { opacity: 0.2; } }
        .countdown-message { font-size: clamp(14px, 3vw, 18px); color: #888; letter-spacing: 3px; text-align: center; line-height: 1.8; }
        .countdown-message .pink { color: #ff6b9d; }
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99)); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay-heart { font-size: 60px; animation: heartbeat 1s ease-in-out infinite; }
        @keyframes heartbeat { 0%,100% { transform: scale(1); } 15% { transform: scale(1.2); } 30% { transform: scale(1); } }
        .overlay-text { font-size: clamp(18px, 4vw, 30px); color: #fff; letter-spacing: 4px; font-weight: 200; margin-top: 20px; text-align: center; opacity: 0; animation: rise 1.5s ease 0.5s forwards; }
        .overlay-text .pink { color: #ff6b9d; }
        .overlay-sub { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px; opacity: 0; animation: rise 1.5s ease 1.5s forwards; }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="countdown-label">距离告白还有</div>
    <div class="timer">
        <div class="time-unit"><div class="time-value" id="days">00</div><div class="time-label">天</div></div>
        <div class="colon">:</div>
        <div class="time-unit"><div class="time-value" id="hours">00</div><div class="time-label">时</div></div>
        <div class="colon">:</div>
        <div class="time-unit"><div class="time-value" id="minutes">00</div><div class="time-label">分</div></div>
        <div class="colon">:</div>
        <div class="time-unit"><div class="time-value" id="seconds">00</div><div class="time-label">秒</div></div>
    </div>
    <div class="countdown-message">每一秒都在积攒勇气<br><span class="pink">只为对你说出那句话</span></div>
    <div class="overlay" id="overlay">
        <div class="overlay-heart">&#10084;</div>
        <div class="overlay-text">倒计时结束<br><span class="pink">我喜欢你</span></div>
        <div class="overlay-sub">COUNTDOWN COMPLETE — MESSAGE DELIVERED</div>
    </div>
    <script>
        var target = Date.now() + 30000;
        function update() {
            var diff = Math.max(0, target - Date.now());
            var d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
            if (diff <= 0) { document.getElementById('overlay').classList.add('visible'); } else { requestAnimationFrame(update); }
        }
        update();
    </script>
</body>
</html>
