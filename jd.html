<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | 童话星辰纪念碑 · 仪式升级版</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', serif; }
        body { background-color: #030406; height: 100vh; width: 100vw; overflow: hidden; position: relative; color: #fff; transition: background-color 1s linear; }

        /* ================= 3D 摄像机与视差层 ================= */
        #universe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center 60%; will-change: transform; background: var(--sky-gradient); transition: background 1s linear; }
        .parallax-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; will-change: transform; }
        .flex-center { display: flex; justify-content: center; align-items: center; }

        /* ================= 动态日夜元素 ================= */
        .moon { position: absolute; top: -150px; left: 20%; width: 120px; height: 120px; background: #fff; border-radius: 50%; box-shadow: 0 0 40px #fff, 0 0 80px #b5d5ff, 0 0 150px #82b4ff; opacity: 0; transition: top 1s, opacity 1s; }
        .sun { position: absolute; top: -150px; left: 70%; width: 100px; height: 100px; background: #fff; border-radius: 50%; box-shadow: 0 0 50px #ffcc00, 0 0 100px #ff8800; opacity: 0; transition: top 1s, opacity 1s; }

        /* ================= 童话场景绘制 ================= */
        .hill-bg { position: absolute; bottom: 15%; width: 180%; height: 400px; background: radial-gradient(ellipse at center, var(--hill-center) 0%, var(--hill-edge) 100%); border-radius: 50% 50% 0 0; left: -40%; transition: background 1s; }
        .hill-fg { position: absolute; bottom: 5%; width: 160%; height: 350px; background: linear-gradient(to bottom, var(--field-top) 0%, var(--field-bottom) 100%); border-radius: 40% 40% 0 0; left: -30%; transition: background 1s, box-shadow 1s; box-shadow: inset 0 30px 60px var(--field-edge-light); }

        .flower-layer-far { position: absolute; bottom: 100px; width: 100%; height: 100px; background-image: radial-gradient(circle at center, var(--flower-far-center) 15%, transparent 20%), radial-gradient(circle at center, var(--flower-far-edge) 20%, transparent 25%); background-repeat: repeat; background-size: 200px 100px; opacity: 0.8; transition: background-image 1s; }
        .flower-layer-grave { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 580px; height: 120px; background-image: var(--grave-flower-pattern); background-repeat: repeat; opacity: 0.7; transition: background-image 1s; pointer-events: none; }

        .grave-mound { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 550px; height: 180px; background: radial-gradient(ellipse at top, var(--grave-top) 0%, var(--grave-bottom) 100%); border-radius: 50% 50% 0 0; z-index: 1; border-top: 2px solid rgba(255, 255, 255, var(--grave-border-opacity)); box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 5px 30px var(--grave-edge-light); transition: background 1s, box-shadow 1s, border 1s; }

        .river { position: absolute; bottom: -5%; left: -10%; width: 120%; height: 25%; background: linear-gradient(to bottom, var(--river-top) 0%, var(--river-bottom) 100%); box-shadow: 0 -15px 40px var(--river-shadow); overflow: hidden; transition: background 1s, box-shadow 1s; }
        .river::after { content: ''; position: absolute; top: 0; left: -100%; width: 200%; height: 100%; background: repeating-linear-gradient(90deg, transparent, rgba(255, 255, 255, var(--river-wave-opacity)) 10%, transparent 20%); animation: riverFlow 10s linear infinite; }
        @keyframes riverFlow { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }

        /* 萤火虫与樱花 */
        .firefly-layer { opacity: var(--firefly-opacity); transition: opacity 1s; }
        .firefly { position: absolute; width: 4px; height: 4px; background: #eaff8f; border-radius: 50%; box-shadow: 0 0 10px #eaff8f, 0 0 20px #bae637; pointer-events: none; animation: floatFly 6s infinite ease-in-out alternate, blink 3s infinite alternate; }
        @keyframes floatFly { 0% { transform: translateY(0) translateX(0); } 100% { transform: translateY(-50px) translateX(30px); } }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .sakura { position: absolute; width: 10px; height: 12px; background-color: #ffb7c5; border-radius: 50% 10% 50% 50%; pointer-events: none; opacity: 0.8; box-shadow: 0 0 3px rgba(255, 255, 255, 0.5); animation: sakuraFall 5s linear infinite; }
        @keyframes sakuraFall { 0% { top: -10px; transform: translateX(0) rotate(0deg); opacity: 0.8;} 100% { top: 100vh; transform: translateX(var(--drift-x)) rotate(var(--rotation)); opacity: 0;} }

        /* 全局环境火光 */
        .fire-illumination { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 90%, rgba(255, 120, 30, 0.4) 0%, rgba(255, 80, 0, 0.1) 50%, transparent 80%); opacity: 0; pointer-events: none; mix-blend-mode: color-dodge; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .fire-illumination.active { opacity: 1; animation: flicker 0.15s infinite alternate; }
        @keyframes flicker { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.02); } }

        /* ================= 治愈系月光石墓碑 ================= */
        .tombstone-container { display: flex; flex-direction: column; align-items: center; margin-top: -30px; transform-style: preserve-3d; position: relative; z-index: 2; }
        .tombstone-base { width: 480px; height: 40px; background: linear-gradient(to bottom, var(--tomb-base-top) 0%, var(--tomb-base-bottom) 100%); border-top: 1px solid rgba(255, 255, 255, 0.8); border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); margin-top: -10px; z-index: 10; transition: background 1s; }
        .tombstone { width: 380px; height: 520px; background: linear-gradient(135deg, var(--tomb-top) 0%, var(--tomb-bottom) 100%); border-top-left-radius: 190px; border-top-right-radius: 190px; border: 2px solid var(--tomb-border); border-bottom: none; box-shadow: inset 0 0 30px rgba(100, 120, 150, 0.2), inset 0 5px 20px rgba(255,255,255,0.8), 0 20px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; padding: 40px 30px 40px 30px; overflow: hidden; transition: background 1s, border 1s, box-shadow 1s; z-index: 9; }
        .tombstone.fire-lit { box-shadow: inset 0 0 30px rgba(100, 120, 150, 0.2), inset 0 -40px 60px rgba(255, 120, 40, 0.3), 0 20px 60px rgba(0,0,0,0.5); }
        .epitaph-title { font-size: 14px; color: var(--tomb-title); letter-spacing: 4px; margin-bottom: 20px; text-transform: uppercase; transition: color 1s; }

        /* 📸 上传相框优化：使用 label 原生触发 */
        .photo-frame { width: 110px; height: 140px; border-radius: 50%; background-color: var(--tomb-base-top); border: 4px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.1); margin-bottom: 25px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; background-size: cover; background-position: center; background-repeat: no-repeat; transition: transform 0.3s, box-shadow 0.3s, background-color 1s; position: relative; }
        .photo-frame:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        .photo-placeholder { font-size: 12px; color: var(--field-edge-light); text-align: center; letter-spacing: 1px; pointer-events: none; transition: color 1s; z-index: 2; }

        /* 修复：用透明绝对定位替代 display:none，防止浏览器拦截 */
        #photoInput { position: absolute; width: 0; height: 0; opacity: 0; overflow: hidden; }

        .epitaph { flex-grow: 1; width: 100%; text-align: center; color: var(--tomb-text); font-size: 1.3rem; line-height: 2.2; letter-spacing: 6px; font-weight: 500; writing-mode: vertical-rl; text-orientation: upright; outline: none; text-shadow: 1px 1px 1px rgba(255,255,255,0.8), -1px -1px 1px rgba(0,0,0,0.2); white-space: pre-wrap; cursor: text; transition: color 1s; }
        .epitaph:focus { color: rgba(212, 175, 55, 0.8); }
        .epitaph:empty::before { content: '点击此处\A铭刻碑文...'; color: var(--field-edge-light); }

        /* ================= 锁定在屏幕上的绝对 UI ================= */
        .fixed-controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 1000; }
        .action-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 12px 35px; border-radius: 30px; font-size: 14px; letter-spacing: 3px; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.4s; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .action-btn .icon { font-size: 22px; }
        .action-btn:hover { border-color: #D4AF37; background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transform: translateY(-3px); }

        .hint-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px; pointer-events: none; z-index: 1000; }

        /* ================= 移动端适配 ================= */
        @media (max-width: 768px) {
            .tombstone { width: 85vw; max-width: 380px; height: auto; min-height: 400px; padding: 30px 20px; border-top-left-radius: 50%; border-top-right-radius: 50%; }
            .tombstone-base { width: 90vw; max-width: 480px; height: 30px; }
            .photo-frame { width: 80px; height: 100px; }
            .epitaph { font-size: 1rem; line-height: 2; letter-spacing: 4px; }
            .epitaph-title { font-size: 12px; }
            .fixed-controls { bottom: 20px; gap: 15px; }
            .action-btn { padding: 10px 20px; font-size: 12px; letter-spacing: 2px; }
            .action-btn .icon { font-size: 18px; }
            .hint-bar { display: none; }
            .grave-mound { width: 90vw; max-width: 550px; height: 120px; }
            .flower-layer-grave { width: 95vw; max-width: 580px; }
            .incense-burner { width: 80px; height: 35px; }
            .incense-stick { height: 40px; }
            .worshipper { width: 40px; height: 55px; }
            .w-head { width: 14px; height: 14px; }
            .w-body { width: 22px; height: 32px; }
            .paper-container { width: 250px; height: 250px; }
            body { overflow: auto; }
            #universe { transform-origin: center center; }
        }

        @media (max-width: 480px) {
            .tombstone { padding: 25px 15px; min-height: 340px; }
            .photo-frame { width: 70px; height: 90px; border-width: 3px; }
            .epitaph { font-size: 0.9rem; letter-spacing: 3px; }
            .fixed-controls { gap: 10px; }
            .action-btn { padding: 8px 15px; font-size: 11px; }
        }

        /* ================= 🌸 祭祀仪式特效 (香炉、小人叩首、烧纸) ================= */

        /* 青铜香炉 */
        .incense-burner { position: absolute; bottom: -15px; width: 100px; height: 45px; background: linear-gradient(to bottom, #8b6d3b 0%, #3b2f1a 100%); border-radius: 10px 10px 45px 45px; box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 3px 5px rgba(255,255,255,0.2); border-top: 4px solid #b38847; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 5px; gap: 12px; z-index: 12; opacity: 0; transition: opacity 1s; }
        .incense-stick { width: 4px; height: 50px; background: #5c3011; position: relative; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .incense-stick::before { content: ''; position: absolute; top: -2px; left: 0; width: 100%; height: 5px; background: #ff5500; box-shadow: 0 0 8px #ff2200; border-radius: 50%; }
        .smoke { position: absolute; top: -5px; left: 50%; width: 2px; height: 60px; background: linear-gradient(to top, rgba(200,210,220,0.6), transparent); filter: blur(3px); transform-origin: bottom; animation: driftSmoke 3s infinite linear; }
        @keyframes driftSmoke { 0% { transform: scaleY(0) rotate(0deg) translateX(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: scaleY(1.8) rotate(15deg) translateX(15px); opacity: 0; top: -100px;} }

        /* 灵体叩首小人 */
        .worshipper { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); width: 50px; height: 70px; display: flex; flex-direction: column; align-items: center; opacity: 0; z-index: 20; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6)); transition: opacity 0.5s; pointer-events: none; }
        .w-head { width: 18px; height: 18px; background: rgba(255,255,255,0.9); border-radius: 50%; }
        .w-body { width: 28px; height: 40px; background: rgba(255,255,255,0.8); border-radius: 12px 12px 4px 4px; margin-top: 2px; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); }
        .worshipper.active { opacity: 0.8; animation: kowtowCycle 4s ease-in-out forwards; }
        @keyframes kowtowCycle { 0%, 25%, 50%, 75%, 100% { transform: translateX(-50%) scaleY(1) translateY(0); } 12%, 37%, 62% { transform: translateX(-50%) scaleY(0.4) translateY(45px); } }

        /* 燃烧粒子容器 */
        .paper-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 350px; height: 350px; pointer-events: none; z-index: 15; overflow: visible; }

        .paper-money { position: absolute; bottom: 0; left: 50%; width: 30px; height: 45px; background: #d4a355; border-radius: 2px; opacity: 0; display: flex; justify-content: center; align-items: center; }
        .paper-money::after { content: ''; width: 12px; height: 12px; background: #ffcc00; border-radius: 50%; opacity: 0.8;}

        .coin-paper { position: absolute; bottom: 0; left: 50%; width: 40px; height: 40px; background: #d4a355; border-radius: 50%; opacity: 0; display: flex; justify-content: center; align-items: center; }
        .coin-paper::before { content: ''; width: 12px; height: 12px; background: transparent; border: 2px solid #a67b38; }

        .burning { animation: burnAndFly 4.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes burnAndFly {
            0% { transform: translate(-50%, 0) rotate(0deg) scale(0.8); opacity: 0; background-color: #d4a355; }
            10% { opacity: 1; background-color: #d4a355; box-shadow: 0 0 10px #ffaa00, inset 0 0 10px #ff4500; filter: brightness(1.2); }
            30% { background-color: #ff4500; box-shadow: 0 0 25px #ff2200, inset 0 0 20px #000; }
            60% { background-color: #222; box-shadow: 0 0 15px #ff2200; filter: brightness(0.7); }
            100% { transform: translate(var(--tx), -450px) rotate(var(--tr)) scale(0.25); opacity: 0; background-color: #0a0a0a; box-shadow: none; filter: brightness(0.2); }
        }

        .hint-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="hint-bar">F5刷新时间起点 · 滚轮缩放 · 鼠标环顾景深</div>

    <div id="universe">
        <div class="parallax-layer" data-depth="10">
            <div class="moon" id="moonLayer"></div>
            <div class="sun" id="sunLayer"></div>
        </div>

        <div class="parallax-layer flex-center" data-depth="15">
            <div class="grave-mound"></div>
            <div class="flower-layer-grave"></div>
        </div>

        <div class="parallax-layer" data-depth="20"><div class="hill-bg"></div></div>
        <div class="parallax-layer" data-depth="30"><div class="flower-layer-far"></div></div>
        <div class="parallax-layer" data-depth="35"><div class="hill-fg"></div></div>
        <div class="parallax-layer firefly-layer" data-depth="40" id="firefly-layer"></div>
        <div class="parallax-layer" data-depth="50" id="sakura-layer"></div>
        <div class="parallax-layer" data-depth="55"><div class="river"></div></div>

        <div class="parallax-layer flex-center" data-depth="80">
            <div class="tombstone-container">
                <div class="tombstone" id="tomb">
                    <div class="epitaph-title">ETERNAL MEMORY</div>

                    <div class="photo-frame" id="photoFrame">
                        <span class="photo-placeholder" id="photoPlaceholder">点击此处<br>上传照片</span>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;">

                    <div class="epitaph" contenteditable="true" spellcheck="false" title="点击可直接编辑铭文">星辰为您引路，思念永不消散</div>
                </div>
                <div class="tombstone-base"></div>

                <div class="incense-burner" id="incense">
                    <div class="incense-stick"><div class="smoke"></div></div>
                    <div class="incense-stick"><div class="smoke" style="animation-delay: -1s;"></div></div>
                    <div class="incense-stick"><div class="smoke" style="animation-delay: -2s;"></div></div>
                </div>

                <div class="worshipper" id="worshipper">
                    <div class="w-head"></div>
                    <div class="w-body"></div>
                </div>

                <div class="paper-container" id="paperBox"></div>
            </div>
        </div>

        <div class="parallax-layer" data-depth="90">
            <div class="fire-illumination" id="fireLight"></div>
        </div>
    </div>

    <div class="fixed-controls">
        <div class="action-btn" onclick="payRespects()">
            <span class="icon">🌸</span>
            <span>致敬祭拜</span>
        </div>
        <div class="action-btn" onclick="burnPapers()">
            <span class="icon">🔥</span>
            <span>引火焚金</span>
        </div>
    </div>

    <script>
        // ================= 📸 图片上传 =================
        const photoInput = document.getElementById('photoInput');
        const photoFrame = document.getElementById('photoFrame');
        const photoPlaceholder = document.getElementById('photoPlaceholder');

        photoFrame.addEventListener('click', () => photoInput.click());

        photoInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                if (!file.type.startsWith('image/')) {
                    alert('请选择正确的图片格式（JPG / PNG 等）');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    photoFrame.style.backgroundImage = `url('${e.target.result}')`;
                    photoPlaceholder.style.display = 'none';
                };
                reader.readAsDataURL(file);

                // 清空输入框值，允许重新选择同一文件
                event.target.value = '';
            }
        });

        // ================= 智能日夜循环系统 =================
        const universe = document.getElementById('universe');
        const sunLayer = document.getElementById('sunLayer');
        const moonLayer = document.getElementById('moonLayer');

        let state = { gameTimeMinutes: 360, timeSpeedFactor: 60, lastFrameTime: Date.now() }

        function updateTimeCycle() {
            const now = Date.now();
            const deltaRealSeconds = (now - state.lastFrameTime) / 1000;
            state.lastFrameTime = now;

            state.gameTimeMinutes += deltaRealSeconds * (state.timeSpeedFactor / 1);
            state.gameTimeMinutes = state.gameTimeMinutes % 1440;

            const currentHour = state.gameTimeMinutes / 60;
            updateEnvironmentLighting(currentHour);
            requestAnimationFrame(updateTimeCycle);
        }

        function updateEnvironmentLighting(hour) {
            let isDay = false; let nightFactor = 0;
            if (hour >= 6 && hour < 18) {
                isDay = true; nightFactor = Math.abs(hour - 12) / 6;
            } else {
                isDay = false; const relativeHour = hour < 6 ? hour + 24 : hour;
                nightFactor = Math.min(1, Math.abs(relativeHour - 24) < 6 ? Math.abs(relativeHour - 24) / 6 : (6 - (relativeHour % 6)) / 6);
                nightFactor = Math.pow(nightFactor, 0.5);
            }

            let skyGrad;
            if (isDay) {
                const blend = Math.pow(nightFactor, 0.5);
                skyGrad = `linear-gradient(to bottom, rgb(${interpolateRGB([30,20,50], [130,180,255], 1-blend)}) 0%, rgb(${interpolateRGB([255,120,30], [200,230,255], 1-blend)}) 50%, rgb(${interpolateRGB([130,180,255], [150,200,255], 1-blend)}) 100%)`;
            } else {
                skyGrad = `linear-gradient(to bottom, rgb(${interpolateRGB([130,180,255], [10,10,25], nightFactor)}) 0%, rgb(${interpolateRGB([120,100,200], [30,40,60], nightFactor)}) 50%, rgb(${interpolateRGB([30,20,50], [17,12,39], nightFactor)}) 100%)`;
            }
            universe.style.setProperty('--sky-gradient', skyGrad);

            sunLayer.style.opacity = isDay ? (1 - nightFactor * 0.8) : 0;
            sunLayer.style.top = isDay ? (5 + nightFactor * 40) + '%' : '-150px';
            moonLayer.style.opacity = !isDay ? Math.pow(nightFactor, 0.5) : 0;
            moonLayer.style.top = !isDay ? (10 + (1 - nightFactor) * 30) + '%' : '-150px';

            universe.style.setProperty('--hill-center', `rgb(${interpolateRGB([27,58,61], [16,33,40], nightFactor)})`);
            universe.style.setProperty('--hill-edge', `rgb(${interpolateRGB([16,33,40], [5,10,15], nightFactor)})`);
            universe.style.setProperty('--field-top', `rgb(${interpolateRGB([44,76,71], [13,26,27], nightFactor)})`);
            universe.style.setProperty('--field-bottom', isDay ? '#0d1a1b' : '#030608');
            universe.style.setProperty('--field-edge-light', isDay ? 'rgba(130, 255, 200, 0.1)' : 'rgba(100, 200, 255, 0.05)');

            universe.style.setProperty('--flower-far-center', isDay ? '#ffcccc' : '#bae637');
            universe.style.setProperty('--flower-far-edge', isDay ? '#ffcccc' : '#82b4ff');
            universe.style.setProperty('--grave-flower-pattern', isDay ? `radial-gradient(circle at center, #ffb7c5 15%, transparent 20%), radial-gradient(circle at center, #ff99cc 20%, transparent 25%)` : `radial-gradient(circle at center, #bae637 15%, transparent 20%), radial-gradient(circle at center, #ff99cc 20%, transparent 25%)`);
            document.querySelector('.flower-layer-grave').style.backgroundSize = isDay ? '40px 30px' : '30px 20px';

            universe.style.setProperty('--grave-top', isDay ? '#dcdfe6' : '#ced3dc');
            universe.style.setProperty('--grave-bottom', isDay ? '#b5d5ff' : '#6e3a15');
            universe.style.setProperty('--grave-edge-light', isDay ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.1)');
            universe.style.setProperty('--grave-border-opacity', isDay ? 0.3 : 0.1);

            universe.style.setProperty('--firefly-opacity', isDay ? 0 : Math.pow(nightFactor, 0.5));
            document.getElementById('sakura-layer').style.opacity = isDay ? 0.9 : 0.4;

            universe.style.setProperty('--river-top', isDay ? '#3a8fb7' : '#1e455e');
            universe.style.setProperty('--river-bottom', isDay ? '#1e455e' : '#0d1a1b');
            universe.style.setProperty('--river-shadow', isDay ? 'rgba(58, 143, 183, 0.4)' : 'rgba(0,0,0,0.8)');
            universe.style.setProperty('--river-wave-opacity', isDay ? 0.1 : 0.05);

            universe.style.setProperty('--tomb-top', isDay ? '#fdfdfd' : '#e1e4ea');
            universe.style.setProperty('--tomb-bottom', isDay ? '#e1e4ea' : '#ced3dc');
            universe.style.setProperty('--tomb-base-top', isDay ? '#dcdfe6' : '#ced3dc');
            universe.style.setProperty('--tomb-border', isDay ? 'rgba(255, 255, 255, 0.6)' : 'rgba(212, 175, 55, 0.3)');
            universe.style.setProperty('--tomb-title', isDay ? '#444a56' : '#b09154');
            universe.style.setProperty('--tomb-text', isDay ? '#444a56' : '#e1e4ea');
        }

        function interpolateRGB(start, end, t) { return `${Math.floor(start[0]+(end[0]-start[0])*t)}, ${Math.floor(start[1]+(end[1]-start[1])*t)}, ${Math.floor(start[2]+(end[2]-start[2])*t)}`; }

        // ================= 智能 3D 摄像机 =================
        const layers = document.querySelectorAll('.parallax-layer');
        let targetScale = 1; let mouseX = 0; let mouseY = 0; let currentScale = 1; let currentX = 0; let currentY = 0;

        window.addEventListener('wheel', (e) => { targetScale -= e.deltaY * 0.0015; targetScale = Math.max(0.7, Math.min(targetScale, 1.8)); });
        window.addEventListener('mousemove', (e) => { mouseX = (e.clientX - window.innerWidth/2) / (window.innerWidth/2) * -1; mouseY = (e.clientY - window.innerHeight/2) / (window.innerHeight/2) * -1; });

        function animateCamera() {
            currentScale += (targetScale - currentScale) * 0.08; currentX += (mouseX - currentX) * 0.05; currentY += (mouseY - currentY) * 0.05;
            universe.style.transform = `scale(${currentScale})`;
            layers.forEach(layer => { const depth = parseFloat(layer.getAttribute('data-depth')); layer.style.transform = `translate(${currentX * depth}px, ${currentY * depth}px)`; });
            requestAnimationFrame(animateCamera);
        }
        animateCamera(); updateTimeCycle();

        // ================= 唯美粒子 =================
        function startSakuraContinuously() {
            const layer = document.getElementById('sakura-layer');
            setInterval(() => {
                const petal = document.createElement('div'); petal.classList.add('sakura');
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.setProperty('--drift-x', (Math.random() - 0.5) * 400 + 'px');
                petal.style.setProperty('--rotation', (Math.random() - 0.5) * 720 + 'deg');
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                layer.appendChild(petal);
                setTimeout(() => { petal.remove(); }, 10000);
            }, 800);
        }

        function createFireflies() {
            const layer = document.getElementById('firefly-layer');
            for (let i = 0; i < 30; i++) {
                let fly = document.createElement('div'); fly.classList.add('firefly');
                fly.style.left = Math.random() * 100 + 'vw'; fly.style.bottom = Math.random() * 50 + 'vh';
                fly.style.animationDelay = Math.random() * 5 + 's'; fly.style.animationDuration = (Math.random() * 3 + 4) + 's';
                layer.appendChild(fly);
            }
        }

        window.onload = function() { createFireflies(); startSakuraContinuously(); };

        // ================= 🌸 祭祀与烧纸逻辑 (仪式升级版) =================
        let isWorshipping = false;
        function payRespects() {
            if(isWorshipping) return;
            isWorshipping = true;

            // 1. 点燃香炉
            document.getElementById('incense').style.opacity = '1';

            // 2. 召唤灵体小人执行叩首
            const worshipper = document.getElementById('worshipper');
            worshipper.classList.add('active');

            // 3. 按钮状态反馈
            const btn = document.querySelectorAll('.action-btn')[0];
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="icon">✨</span><span>虔诚致敬</span>';
            btn.style.borderColor = '#D4AF37'; btn.style.color = '#D4AF37';

            // 4秒后动画结束，恢复原样
            setTimeout(() => {
                worshipper.classList.remove('active');
                btn.innerHTML = originalText;
                btn.style.borderColor = 'rgba(255, 255, 255, 0.3)'; btn.style.color = '#fff';
                isWorshipping = false;
            }, 4000);
        }

        let isBurning = false;
        function burnPapers() {
            if (isBurning) return;
            isBurning = true;

            const fireLight = document.getElementById('fireLight');
            const tomb = document.getElementById('tomb');
            const paperBox = document.getElementById('paperBox');

            fireLight.classList.add('active');
            tomb.classList.add('fire-lit');

            let paperCount = 0;
            const maxPapers = 35;

            const burst = setInterval(() => {
                if (paperCount >= maxPapers) {
                    clearInterval(burst);
                    return;
                }

                const paper = document.createElement('div');
                // 随机生成：长条黄表纸 或 外圆内方铜钱纸
                if(Math.random() > 0.4) {
                    paper.classList.add('coin-paper');
                } else {
                    paper.classList.add('paper-money');
                }

                paper.classList.add('burning');

                const randomX = (Math.random() - 0.5) * 350 + 'px';
                const randomRotate = (Math.random() - 0.5) * 720 + 'deg';

                paper.style.setProperty('--tx', randomX);
                paper.style.setProperty('--tr', randomRotate);
                paper.style.left = 40 + Math.random() * 20 + '%';

                paperBox.appendChild(paper);

                setTimeout(() => { paper.remove(); }, 4500);
                paperCount++;
            }, 120);
            setTimeout(() => {
                fireLight.classList.remove('active');
                tomb.classList.remove('fire-lit');
                isBurning = false;
            }, (maxPapers * 120) + 2500);
        }
    </script>
