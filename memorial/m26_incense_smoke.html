<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>青烟 · 袅袅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'STSong', 'SimSun', serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .text { position: fixed; bottom: 12vh; left: 0; right: 0; text-align: center; font-size: 13px; color: rgba(200,195,185,0.12); letter-spacing: 4px; opacity: 0; transition: opacity 4s ease; }
        .text.visible { opacity: 1; }
        .hint { position: fixed; bottom: 6vh; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(200,195,185,0.1); letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text" id="text">烟散了，思念没有</div>
    <div class="hint">长按屏幕，点燃一炷香</div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);

        var particles = [];
        var lit = false;
        var pressing = false;
        var holdTime = 0;
        var glowOp = 0;
        var emberX, emberY;

        document.addEventListener('mousedown', function() { pressing = true; });
        document.addEventListener('mouseup', function() { pressing = false; });
        document.addEventListener('touchstart', function() { pressing = true; }, { passive: true });
        document.addEventListener('touchend', function() { pressing = false; });

        function drawIncense(cx, cy, t) {
            ctx.strokeStyle = 'rgba(80,60,40,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy + 80);
            ctx.lineTo(cx, cy);
            ctx.stroke();

            if (lit) {
                glowOp = Math.min(0.8, glowOp + 0.02);
                var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 15);
                glow.addColorStop(0, 'rgba(200,100,50,' + (glowOp * 0.4) + ')');
                glow.addColorStop(0.5, 'rgba(200,80,30,' + (glowOp * 0.15) + ')');
                glow.addColorStop(1, 'rgba(200,80,30,0)');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(cx, cy, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,100,50,' + (glowOp * 0.6) + ')';
                ctx.fill();
                if (Math.random() > 0.5) {
                    particles.push({
                        x: cx + (Math.random() - 0.5) * 3,
                        y: cy,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: -0.5 - Math.random() * 0.5,
                        r: 2 + Math.random() * 3,
                        op: 0.15 + Math.random() * 0.1,
                        life: 1,
                        decay: 0.003 + Math.random() * 0.003,
                        wobble: Math.random() * Math.PI * 2
                    });
                }
            } else if (pressing) {
                holdTime += 16;
                var progress = Math.min(1, holdTime / 2000);
                ctx.beginPath();
                ctx.arc(cx, cy, 5 + progress * 10, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,100,50,' + (progress * 0.2) + ')';
                ctx.fill();
                if (holdTime >= 2000) {
                    lit = true;
                    document.querySelector('.hint').style.opacity = '0';
                    document.getElementById('text').classList.add('visible');
                }
            }
        }

        function draw(t) {
            var w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            var bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.6);
            bg.addColorStop(0, '#121210');
            bg.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            emberX = w / 2;
            emberY = h * 0.5;
            drawIncense(emberX, emberY, t);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx + Math.sin(t * 0.002 + p.wobble) * 0.3;
                p.y += p.vy;
                p.r += 0.05;
                p.op *= 0.997;
                p.life -= p.decay;
                if (p.life > 0 && p.op > 0.01) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(180,180,180,' + (p.op * p.life) + ')';
                    ctx.fill();
                }
            }
            particles = particles.filter(function(p) { return p.life > 0 && p.op > 0.01; });

            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
