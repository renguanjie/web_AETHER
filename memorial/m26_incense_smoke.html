<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>青烟 · 袅袅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #080808;
            font-family: 'STSong', 'SimSun', serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; }

        .text {
            position: fixed;
            bottom: 12vh;
            left: 0; right: 0;
            text-align: center;
            font-size: 14px;
            color: rgba(200,195,185,0.15);
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 5s ease;
            pointer-events: none;
        }
        .text.visible { opacity: 1; }

        .hint {
            position: fixed;
            bottom: 6vh;
            left: 0; right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(200,195,185,0.1);
            letter-spacing: 3px;
            transition: opacity 2s ease;
        }

        .darkness {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 2, 2, 0);
            pointer-events: none;
            transition: background 8s ease;
            z-index: 5;
        }
        .darkness.fallen {
            background: rgba(2, 2, 2, 0.97);
        }

        .final-text {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: rgba(210,205,200,0.2);
            letter-spacing: 8px;
            opacity: 0;
            transition: opacity 6s ease;
            pointer-events: none;
            z-index: 6;
            white-space: nowrap;
        }
        .final-text.visible { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text" id="text">烟散了，思念还在升腾</div>
    <div class="hint" id="hint">轻触屏幕，点燃一炷香</div>
    <div class="darkness" id="darkness"></div>
    <div class="final-text" id="finalText">一切终将归于寂静</div>

<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var W, H, emberX, emberY;

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
    emberX = W / 2;
    emberY = H * 0.55;
}
resize();
window.addEventListener('resize', resize);

/* ===== Smoke particle system with wind field ===== */
var smokeParticles = [];
var lit = false;
var litTime = 0;
var fadingStarted = false;
var smokeOpacity = 1;

/* Wind field - mouse influence */
var mouseX = 0, mouseY = 0;
var windX = 0, windY = 0;

document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    var dx = mouseX - emberX;
    var dy = mouseY - emberY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 300 && dist > 5) {
        windX = (dx / dist) * (1 - dist / 300) * 0.8;
        windY = (dy / dist) * (1 - dist / 300) * 0.3;
    } else {
        windX *= 0.95;
        windY *= 0.95;
    }
});

document.addEventListener('touchmove', function(e) {
    var t = e.touches[0];
    var dx = t.clientX - emberX;
    var dy = t.clientY - emberY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 300 && dist > 5) {
        windX = (dx / dist) * (1 - dist / 300) * 0.6;
    }
}, { passive: true });

/* Click/touch to light incense */
function tryLight() {
    if (lit) return;
    lit = true;
    litTime = Date.now();
    document.getElementById('hint').style.opacity = '0';
    setTimeout(function() {
        document.getElementById('text').classList.add('visible');
    }, 3000);

    /* Start fading after 3 minutes */
    setTimeout(function() {
        fadingStarted = true;
    }, 180000);

    /* Screen goes dark after 3:30 */
    setTimeout(function() {
        document.getElementById('darkness').classList.add('fallen');
        setTimeout(function() {
            document.getElementById('finalText').classList.add('visible');
        }, 4000);
    }, 210000);
}

document.addEventListener('click', tryLight);
document.addEventListener('touchstart', function(e) {
    if (!lit) {
        e.preventDefault();
        tryLight();
    }
}, { passive: false });

function spawnSmoke() {
    if (!lit) return;

    var rate = fadingStarted ? 0.3 : 0.7;
    if (Math.random() > rate) return;

    var count = fadingStarted ? 1 : (2 + Math.floor(Math.random() * 2));
    for (var i = 0; i < count; i++) {
        smokeParticles.push({
            x: emberX + (Math.random() - 0.5) * 4,
            y: emberY - 5,
            vx: (Math.random() - 0.5) * 0.15,
            vy: -0.4 - Math.random() * 0.6,
            radius: 1 + Math.random() * 2,
            targetRadius: 8 + Math.random() * 15,
            opacity: 0.08 + Math.random() * 0.06,
            life: 1,
            decay: 0.002 + Math.random() * 0.003,
            wobblePhase: Math.random() * Math.PI * 2,
            wobbleSpeed: 0.001 + Math.random() * 0.002,
            wobbleAmp: 0.15 + Math.random() * 0.25
        });
    }
}

function updateSmoke(time) {
    var breeze = Math.sin(time * 0.0003) * 0.08;

    for (var i = smokeParticles.length - 1; i >= 0; i--) {
        var p = smokeParticles[i];

        p.wobblePhase += p.wobbleSpeed * 16;
        var wobble = Math.sin(p.wobblePhase) * p.wobbleAmp;

        p.vx += (wobble + windX + breeze) * 0.02;
        p.vy += (windY * 0.3 - 0.005);

        p.vx *= 0.98;
        p.vy *= 0.995;

        p.x += p.vx;
        p.y += p.vy;

        p.radius += (p.targetRadius - p.radius) * 0.01;
        p.life -= p.decay;

        if (fadingStarted) {
            smokeOpacity = Math.max(0, smokeOpacity - 0.0005);
        }

        if (p.life <= 0 || p.opacity < 0.005) {
            smokeParticles.splice(i, 1);
        }
    }

    if (smokeParticles.length > 600) {
        smokeParticles.splice(0, smokeParticles.length - 600);
    }
}

function drawSmoke() {
    for (var i = 0; i < smokeParticles.length; i++) {
        var p = smokeParticles[i];
        var alpha = p.opacity * p.life * smokeOpacity;
        if (alpha < 0.003) continue;

        var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
        grad.addColorStop(0, 'rgba(190, 185, 180, ' + alpha + ')');
        grad.addColorStop(0.4, 'rgba(170, 165, 160, ' + (alpha * 0.5) + ')');
        grad.addColorStop(1, 'rgba(150, 145, 140, 0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawIncenseStick() {
    var cx = emberX;
    var baseY = emberY + 120;
    var tipY = emberY;

    ctx.strokeStyle = 'rgba(70, 50, 35, 0.5)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, baseY);
    ctx.lineTo(cx, tipY);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(90, 70, 50, 0.15)';
    ctx.lineWidth = 1;
    for (var y = tipY + 10; y < baseY - 5; y += 8) {
        ctx.beginPath();
        ctx.moveTo(cx - 1, y);
        ctx.lineTo(cx + 1, y);
        ctx.stroke();
    }

    ctx.fillStyle = 'rgba(60, 40, 30, 0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, baseY + 5, 18, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(50, 35, 25, 0.2)';
    ctx.beginPath();
    ctx.ellipse(cx, baseY + 3, 15, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    if (lit) {
        var glowPulse = 0.7 + Math.sin(Date.now() * 0.003) * 0.15;
        var emberGrad = ctx.createRadialGradient(cx, tipY, 0, cx, tipY, 12);
        emberGrad.addColorStop(0, 'rgba(220, 120, 50, ' + (0.6 * glowPulse) + ')');
        emberGrad.addColorStop(0.3, 'rgba(200, 80, 30, ' + (0.25 * glowPulse) + ')');
        emberGrad.addColorStop(0.7, 'rgba(180, 60, 20, ' + (0.08 * glowPulse) + ')');
        emberGrad.addColorStop(1, 'rgba(180, 60, 20, 0)');
        ctx.fillStyle = emberGrad;
        ctx.beginPath();
        ctx.arc(cx, tipY, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'rgba(255, 180, 80, ' + (0.5 * glowPulse) + ')';
        ctx.beginPath();
        ctx.arc(cx, tipY, 1.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(100, 95, 90, 0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, tipY + 2);
        ctx.lineTo(cx, tipY + 8);
        ctx.stroke();
    }
}

function drawBackground() {
    var grad = ctx.createRadialGradient(W / 2, H * 0.5, 0, W / 2, H * 0.5, Math.max(W, H) * 0.7);
    grad.addColorStop(0, '#101010');
    grad.addColorStop(1, '#080808');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

function animate(time) {
    drawBackground();
    drawIncenseStick();
    spawnSmoke();
    updateSmoke(time);
    drawSmoke();
    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
