<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>倒影 · 镜像</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: -apple-system, 'PingFang SC', sans-serif; }
        .top-half { position: absolute; top: 0; left: 0; right: 0; height: 50%; display: flex; justify-content: center; align-items: center; background: linear-gradient(180deg, #2a2a2a, #1a1a1a); overflow: hidden; }
        .portrait { width: 120px; height: 160px; background: linear-gradient(135deg, #3a3a3a, #2a2a2a); border-radius: 4px; display: flex; justify-content: center; align-items: center; color: rgba(200,195,185,0.3); font-size: 48px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .divider { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(100,120,140,0.2); z-index: 5; }
        .bottom-half { position: absolute; top: 50%; left: 0; right: 0; height: 50%; background: linear-gradient(180deg, #0a1520, #0a0a15); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .text { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-family: 'STSong', 'SimSun', serif; font-size: 12px; color: rgba(200,195,185,0.2); letter-spacing: 4px; }
    </style>
</head>
<body>
    <div class="top-half"><div class="portrait">&#10084;</div></div>
    <div class="divider"></div>
    <div class="bottom-half"><canvas id="water"></canvas></div>
    <div class="text">生死两界，触不可及</div>
    <script>
        var canvas = document.getElementById('water'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = canvas.offsetWidth * dpr; canvas.height = canvas.offsetHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);
        var W = function() { return canvas.offsetWidth; }, H = function() { return canvas.offsetHeight; };
        var mx = -1000, my = -1000;
        document.querySelector('.bottom-half').addEventListener('mousemove', function(e) { var r = e.currentTarget.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; });
        document.querySelector('.bottom-half').addEventListener('mouseleave', function() { mx = -1000; my = -1000; });
        var t = 0;
        function draw() {
            var w = W(), h = H(); ctx.clearRect(0, 0, w, h); t += 0.01;
            var dist = Math.sqrt((mx-w/2)*(mx-w/2)+(my-h/2)*(my-h/2));
            var d = dist < 100 ? 8 : (dist < 200 ? 3 : 0);
            for (var y = 0; y < h; y += 2) { var off = Math.sin(y*0.05+t*2)*(1+d)+Math.sin(y*0.03+t*1.5)*d; var a = 0.15-y/h*0.1; ctx.fillStyle = 'rgba(60,60,60,' + Math.max(0,a) + ')'; ctx.fillRect(w/2-60+off, y+10, 120, 2); }
            for (var i = 0; i < 5; i++) { var ry = 20+i*30+Math.sin(t+i)*5; ctx.strokeStyle = 'rgba(100,120,140,0.04)'; ctx.lineWidth = 0.5; ctx.beginPath(); for (var x = 0; x < w; x += 4) { var yy = ry+Math.sin(x*0.02+t*1.5+i)*3; if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy); } ctx.stroke(); }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
