<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>枯山水 · 涟漪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #c8c0b0; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'STSong', 'SimSun', serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
        .text { position: fixed; bottom: 12vh; left: 0; right: 0; text-align: center; font-size: 13px; color: rgba(60,50,40,0.25); letter-spacing: 4px; opacity: 0; transition: opacity 4s ease; }
        .text.visible { opacity: 1; }
        .hint { position: fixed; bottom: 6vh; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(60,50,40,0.2); letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text" id="text">沙纹会平，石不移，念不散</div>
    <div class="hint">拖拽沙面，留下你的纹路</div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);

        var ripples = [];
        var stones = [];
        var sandLines = [];
        var dragging = false;
        var lastX, lastY;
        var rippleCount = 0;

        function initStones() {
            var w = window.innerWidth, h = window.innerHeight;
            stones = [
                { x: w * 0.35, y: h * 0.4, r: 18 },
                { x: w * 0.65, y: h * 0.55, r: 12 },
                { x: w * 0.5, y: h * 0.35, r: 8 }
            ];
            sandLines = [];
            for (var y = 0; y < h; y += 12) {
                sandLines.push({ y: y, curve: Math.sin(y * 0.01) * 20 });
            }
        }

        canvas.addEventListener('mousedown', function(e) { dragging = true; lastX = e.clientX; lastY = e.clientY; });
        canvas.addEventListener('mouseup', function() { dragging = false; });
        canvas.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            ripples.push({ x: e.clientX, y: e.clientY, radius: 0, opacity: 0.3, speed: 0.5 });
            rippleCount++;
            if (rippleCount > 5) {
                document.getElementById('text').classList.add('visible');
                document.querySelector('.hint').style.opacity = '0';
            }
            lastX = e.clientX; lastY = e.clientY;
        });

        canvas.addEventListener('touchstart', function(e) {
            dragging = true;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        }, { passive: true });
        canvas.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var t = e.touches[0];
            ripples.push({ x: t.clientX, y: t.clientY, radius: 0, opacity: 0.3, speed: 0.5 });
            rippleCount++;
            if (rippleCount > 5) {
                document.getElementById('text').classList.add('visible');
                document.querySelector('.hint').style.opacity = '0';
            }
            lastX = t.clientX; lastY = t.clientY;
        }, { passive: true });
        canvas.addEventListener('touchend', function() { dragging = false; });

        function draw(t) {
            var w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = '#c8c0b0';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = 'rgba(0,0,0,0.015)';
            for (var i = 0; i < 500; i++) {
                ctx.fillRect((i * 47.3) % w, (i * 73.7) % h, 1, 1);
            }

            for (var j = 0; j < sandLines.length; j++) {
                var sl = sandLines[j];
                ctx.beginPath();
                for (var x = 0; x < w; x += 3) {
                    var yy = sl.y + sl.curve + Math.sin(x * 0.005 + j * 0.1) * 2;
                    if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
                }
                ctx.strokeStyle = 'rgba(100,90,75,0.08)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            for (var k = 0; k < ripples.length; k++) {
                var r = ripples[k];
                r.radius += r.speed;
                r.opacity *= 0.998;
                if (r.opacity < 0.01) continue;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(100,90,75,' + r.opacity + ')';
                ctx.lineWidth = 1;
                ctx.stroke();
                if (r.radius > 10) {
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius - 10, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(100,90,75,' + (r.opacity * 0.5) + ')';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
            ripples = ripples.filter(function(r) { return r.opacity > 0.01; });

            for (var s = 0; s < stones.length; s++) {
                var stone = stones[s];
                ctx.beginPath();
                ctx.ellipse(stone.x + 3, stone.y + 3, stone.r, stone.r * 0.7, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(stone.x, stone.y, stone.r, stone.r * 0.7, 0, 0, Math.PI * 2);
                var stoneGrad = ctx.createRadialGradient(stone.x - stone.r * 0.2, stone.y - stone.r * 0.2, 0, stone.x, stone.y, stone.r);
                stoneGrad.addColorStop(0, '#8a8070');
                stoneGrad.addColorStop(0.5, '#6a6050');
                stoneGrad.addColorStop(1, '#5a5040');
                ctx.fillStyle = stoneGrad;
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }
        initStones();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
