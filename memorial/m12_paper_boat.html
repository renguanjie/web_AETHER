<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>纸船 · 摆渡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(180deg, #0a0a15, #15152a); font-family: 'STSong', 'SimSun', serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
        .hint { position: fixed; bottom: 15vh; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(200,195,185,0.2); letter-spacing: 4px; transition: opacity 2s ease; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">点击水面，放一只纸船</div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);
        var boats = [];
        canvas.addEventListener('click', function(e) { boats.push({ x: e.clientX, y: e.clientY, op: 0.9, speed: 0.3+Math.random()*0.3, w: Math.random()*Math.PI*2 }); document.getElementById('hint').style.opacity = '0'; });
        function draw(t) {
            var w = window.innerWidth, h = window.innerHeight; ctx.clearRect(0, 0, w, h);
            var rg = ctx.createLinearGradient(0,0,0,h); rg.addColorStop(0,'#0a0a20'); rg.addColorStop(1,'#0a1525'); ctx.fillStyle = rg; ctx.fillRect(0,0,w,h);
            for (var i = 0; i < 15; i++) { var y = i*h/15; ctx.strokeStyle = 'rgba(100,120,150,0.04)'; ctx.lineWidth = 0.5; ctx.beginPath(); for (var x = 0; x < w; x += 5) { var yy = y+Math.sin(x*0.008+t*0.0003+i*0.5)*8+Math.sin(x*0.003+t*0.0002)*5; if(x===0)ctx.moveTo(x,yy);else ctx.lineTo(x,yy); } ctx.stroke(); }
            for (var j = 0; j < boats.length; j++) { var b = boats[j]; b.y -= b.speed; b.w += 0.01; b.op *= 0.9995; if(b.y<-30) continue; ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(Math.sin(b.w)*0.05); ctx.fillStyle = 'rgba(220,215,200,'+b.op+')'; ctx.beginPath(); ctx.moveTo(-15,-5); ctx.lineTo(15,-5); ctx.lineTo(10,5); ctx.lineTo(-10,5); ctx.closePath(); ctx.fill(); ctx.fillStyle = 'rgba(220,215,200,'+(b.op*0.6)+')'; ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(0,-20); ctx.lineTo(8,-5); ctx.closePath(); ctx.fill(); ctx.restore(); }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
