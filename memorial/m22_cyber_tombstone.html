<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>赛博 · 墓碑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'STSong', 'SimSun', serif; }
        .container { text-align: center; position: relative; }
        .tombstone { width: 180px; margin: 0 auto; position: relative; }
        .tombstone .top { width: 100%; height: 20px; background: linear-gradient(180deg, #1a1a1a, #151515); border-radius: 10px 10px 0 0; }
        .tombstone .body { width: 100%; height: 120px; background: linear-gradient(180deg, #151515, #111); border-left: 1px solid rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .tombstone .base { width: 110%; height: 8px; background: #1a1a1a; margin-left: -5%; border-radius: 2px; }
        .name { font-size: 16px; color: rgba(200,195,185,0.4); letter-spacing: 6px; margin-bottom: 8px; }
        .dates { font-size: 10px; color: rgba(200,195,185,0.2); letter-spacing: 2px; }
        .epitaph { font-size: 12px; color: rgba(200,195,185,0.15); margin-top: 25px; letter-spacing: 4px; opacity: 0; transition: opacity 4s ease; }
        .epitaph.visible { opacity: 1; }
        .terminal { font-family: 'Courier New', monospace; font-size: 11px; color: rgba(100,200,100,0.2); margin-top: 40px; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; line-height: 1.8; }
        .terminal .cmd { color: rgba(100,200,100,0.3); }
        .hint { position: fixed; bottom: 6vh; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(200,195,185,0.1); letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tombstone">
            <div class="top"></div>
            <div class="body">
                <div class="name">念</div>
                <div class="dates">∞ — ∞</div>
            </div>
            <div class="base"></div>
        </div>
        <div class="epitaph" id="epitaph">你长眠于此，我思念于此</div>
        <div class="terminal" id="terminal"></div>
    </div>
    <div class="hint" id="hint">点击墓碑，读取最后一条消息</div>
    <script>
        var started = false;
        var terminalLines = [
            { text: '> echo $LAST_MESSAGE', cls: 'cmd', delay: 800 },
            { text: '"晚安，明天见。"', delay: 2000 },
            { text: '', delay: 500 },
            { text: '> cat /dev/heart', cls: 'cmd', delay: 800 },
            { text: 'still_beating...', delay: 1500 },
            { text: '', delay: 500 },
            { text: '> ping forever', cls: 'cmd', delay: 800 },
            { text: 'Request timeout...', delay: 3000 },
            { text: 'Request timeout...', delay: 3000 },
            { text: '...still waiting', delay: 2000 },
        ];

        document.addEventListener('click', function() {
            if (started) return;
            started = true;
            document.getElementById('hint').style.opacity = '0';
            document.getElementById('epitaph').classList.add('visible');
            typeTerminal();
        });

        document.addEventListener('touchstart', function() {
            if (started) return;
            started = true;
            document.getElementById('hint').style.opacity = '0';
            document.getElementById('epitaph').classList.add('visible');
            typeTerminal();
        }, { passive: true });

        function typeTerminal() {
            var el = document.getElementById('terminal');
            var idx = 0;
            function next() {
                if (idx >= terminalLines.length) return;
                var line = terminalLines[idx];
                var div = document.createElement('div');
                if (line.cls) div.className = line.cls;
                el.appendChild(div);
                if (line.cls === 'cmd') {
                    var charIdx = 0;
                    function typeChar() {
                        if (charIdx < line.text.length) {
                            div.textContent += line.text[charIdx];
                            charIdx++;
                            setTimeout(typeChar, 60);
                        } else {
                            idx++;
                            setTimeout(next, terminalLines[idx] ? terminalLines[idx].delay : 500);
                        }
                    }
                    typeChar();
                } else {
                    div.textContent = line.text;
                    idx++;
                    setTimeout(next, line.delay);
                }
            }
            setTimeout(next, 500);
        }
    </script>
</body>
</html>
