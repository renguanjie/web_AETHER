<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>风信子 · 绽放</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .flower-container { position: relative; width: 200px; height: 350px; }
        .stem { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 3px; height: 0; background: linear-gradient(to top, #4a5a3a, #5a6a4a); border-radius: 2px; transition: height 3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .stem.grown { height: 180px; }
        .petal-cluster { position: absolute; top: 0; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .petal-cluster.bloomed { opacity: 1; }
        .petal { position: absolute; width: 8px; height: 20px; background: radial-gradient(ellipse, rgba(240,240,235,0.9), rgba(220,220,210,0.6)); border-radius: 50%; transform-origin: bottom center; }
        .btn { margin-top: 40px; padding: 12px 30px; background: transparent; border: 1px solid rgba(200,195,185,0.15); border-radius: 4px; color: rgba(200,195,185,0.4); font-size: 12px; letter-spacing: 4px; cursor: pointer; font-family: inherit; user-select: none; transition: all 2s ease; -webkit-user-select: none; }
        .btn:active { border-color: rgba(200,195,185,0.4); color: rgba(200,195,185,0.7); }
        .text { margin-top: 20px; font-family: 'STSong', 'SimSun', serif; font-size: 12px; color: rgba(200,195,185,0.2); letter-spacing: 3px; opacity: 0; transition: opacity 3s ease; }
        .text.visible { opacity: 1; }
    </style>
</head>
<body>
    <div class="flower-container" id="container">
        <div class="stem" id="stem"></div>
        <div class="petal-cluster" id="cluster"></div>
    </div>
    <button class="btn" id="btn">长按浇灌思念</button>
    <div class="text" id="text">枯萎的花，也曾为你盛开</div>
    <script>
        var stem = document.getElementById('stem'), cluster = document.getElementById('cluster'), text = document.getElementById('text'), btn = document.getElementById('btn');
        var pressing = false;
        for (var i = 0; i < 12; i++) { var p = document.createElement('div'); p.className = 'petal'; var a = (i/12)*Math.PI*2, r = 15+Math.random()*10; p.style.left = Math.cos(a)*r+'px'; p.style.top = Math.sin(a)*r-20+'px'; p.style.transform = 'rotate('+(a*180/Math.PI)+'deg)'; cluster.appendChild(p); }
        function on() { pressing = true; } function off() { pressing = false; }
        btn.addEventListener('mousedown', on); btn.addEventListener('mouseup', off); btn.addEventListener('mouseleave', off);
        btn.addEventListener('touchstart', on, { passive: true }); btn.addEventListener('touchend', off);
        function check() { if (pressing) { stem.classList.add('grown'); setTimeout(function() { cluster.classList.add('bloomed'); }, 2000); setTimeout(function() { text.classList.add('visible'); }, 4000); } else { stem.classList.remove('grown'); cluster.classList.remove('bloomed'); text.classList.remove('visible'); } requestAnimationFrame(check); }
        requestAnimationFrame(check);
    </script>
</body>
</html>
