<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星图 · 化作星辰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: -apple-system, 'PingFang SC', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .fade-overlay { position: fixed; inset: 0; background: #000; opacity: 0; pointer-events: none; transition: opacity 4s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10; }
        .fade-overlay.active { opacity: 0.92; }
        .final-text { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .final-text.visible { opacity: 1; pointer-events: auto; }
        .final-text p { font-family: 'STSong', 'SimSun', serif; font-size: clamp(14px, 3vw, 18px); color: rgba(200,195,185,0.7); letter-spacing: 6px; text-align: center; }
        .final-text .sub { font-size: 11px; color: rgba(200,195,185,0.3); letter-spacing: 4px; margin-top: 20px; }
        .hint { position: fixed; bottom: 30px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(200,195,185,0.2); letter-spacing: 3px; transition: opacity 3s ease; z-index: 5; }
        .count { position: fixed; top: 20px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(200,195,185,0.3); letter-spacing: 3px; z-index: 5; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="fade-overlay" id="fade"></div>
    <div class="final-text" id="final">
        <p>你只是换了一种方式陪伴</p>
        <div class="sub">YOU LIVE ON IN THE STARS</div>
    </div>
    <div class="hint" id="hint">点击星星，连成属于你的星座</div>
    <div class="count" id="count"></div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);
        var stars = [];
        for (var i = 0; i < 200; i++) stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: 0.5 + Math.random() * 1.5, base: 0.1 + Math.random() * 0.4, phase: Math.random() * Math.PI * 2 });
        var clicked = [], isFinal = false;
        function draw(t) {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (var i = 0; i < stars.length; i++) { var s = stars[i]; var g = s.base + 0.3 * (0.5 + 0.5 * Math.sin(t * 0.001 + s.phase)); ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(200,200,220,' + g + ')'; ctx.fill(); }
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.5;
            for (var j = 1; j < clicked.length; j++) { var a = stars[clicked[j-1]], b = stars[clicked[j]]; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); }
            for (var k = 0; k < clicked.length; k++) { var cs = stars[clicked[k]]; ctx.beginPath(); ctx.arc(cs.x, cs.y, cs.r+2, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fill(); ctx.beginPath(); ctx.arc(cs.x, cs.y, cs.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill(); }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
        canvas.addEventListener('click', function(e) {
            if (isFinal) return;
            var mx = e.clientX, my = e.clientY, closest = -1, minD = 30;
            for (var i = 0; i < stars.length; i++) { var dx = stars[i].x-mx, dy = stars[i].y-my, d = Math.sqrt(dx*dx+dy*dy); if (d < minD) { minD = d; closest = i; } }
            if (closest >= 0 && clicked.indexOf(closest) === -1) { clicked.push(closest); document.getElementById('count').textContent = clicked.length + ' / 7'; if (clicked.length >= 7) { isFinal = true; document.getElementById('hint').style.opacity = '0'; document.getElementById('count').textContent = ''; setTimeout(function() { document.getElementById('fade').classList.add('active'); setTimeout(function() { document.getElementById('final').classList.add('visible'); }, 2000); }, 2000); } }
        });
    </script>
</body>
</html>
