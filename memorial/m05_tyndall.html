<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>晨曦 · 丁达尔</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #0a1a0a; font-family: 'STSong', 'SimSun', serif; color: rgba(200,195,185,0.7); overflow-y: auto; }
        .spacer { height: 100vh; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 40px; }
        .spacer p { font-size: 12px; color: rgba(200,195,185,0.2); letter-spacing: 4px; }
        .scene { position: relative; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .forest { position: absolute; inset: 0; background: linear-gradient(180deg, #0a150a 0%, #0d1f0d 40%, #1a2a1a 100%); }
        .beam-container { position: absolute; inset: 0; opacity: 0; transition: opacity 3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .beam-container.visible { opacity: 1; }
        .beam { position: absolute; top: -20px; left: -10%; width: 120%; height: 120%; background: linear-gradient(160deg, rgba(255,220,150,0.08), rgba(255,220,150,0.03) 30%, transparent 60%); transform: rotate(-15deg); filter: blur(20px); }
        .beam-2 { position: absolute; top: -10px; left: 5%; width: 80%; height: 100%; background: linear-gradient(170deg, rgba(255,200,120,0.05), transparent 50%); transform: rotate(-8deg); filter: blur(15px); }
        .stone { position: relative; z-index: 5; width: min(320px, 80vw); padding: 40px 30px; background: linear-gradient(135deg, #2a3a2a, #1a2a1a); border-radius: 4px; border: 1px solid rgba(100,120,100,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: all 3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .stone.visible { opacity: 1; transform: translateY(0); }
        .stone h2 { font-size: 16px; font-weight: 300; letter-spacing: 6px; margin-bottom: 20px; color: rgba(200,195,185,0.5); }
        .stone p { font-size: 13px; line-height: 2.5; color: rgba(200,195,185,0.4); letter-spacing: 2px; }
        .moss { position: absolute; bottom: -5px; left: 10%; width: 80%; height: 10px; background: linear-gradient(to top, rgba(60,80,60,0.3), transparent); border-radius: 50%; }
    </style>
</head>
<body>
    <div class="spacer"><p>向下滚动，等一束光来</p></div>
    <div class="scene" id="scene">
        <div class="forest"></div>
        <div class="beam-container" id="beams"><div class="beam"></div><div class="beam-2"></div></div>
        <div class="stone" id="stone">
            <h2>纪 念</h2>
            <p>你来的那一日<br>苔痕上了石阶<br>阳光穿过树叶的缝隙<br>照亮了你坐过的地方<br><br>生命有尽时，思念无绝期</p>
            <div class="moss"></div>
        </div>
    </div>
    <div style="height:100vh;"></div>
    <script>
        var beams = document.getElementById('beams'), stone = document.getElementById('stone'), shown = false;
        window.addEventListener('scroll', function() {
            if (shown) return;
            var r = document.getElementById('scene').getBoundingClientRect();
            if (r.top < window.innerHeight * 0.5 && r.bottom > 0) { shown = true; beams.classList.add('visible'); setTimeout(function() { stone.classList.add('visible'); }, 1500); }
        });
    </script>
</body>
</html>
