<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>落叶 · 归根</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'STSong', 'SimSun', serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .poem { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; padding: 20px; opacity: 0; transition: opacity 3s ease; pointer-events: none; z-index: 10; }
        .poem.visible { opacity: 1; }
        .poem p { font-size: clamp(12px, 2.5vw, 15px); color: rgba(80,60,40,0.7); line-height: 2.5; letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="poem" id="poem"><p>落叶不是无情物<br>化作春泥更护花<br><br>你归于尘土，却开在我心间</p></div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);
        var leaves = [];
        for (var i = 0; i < 30; i++) leaves.push({ x: Math.random()*window.innerWidth, y: -50-Math.random()*400, r: Math.random()*Math.PI*2, vr: (Math.random()-0.5)*0.01, vx: (Math.random()-0.5)*0.3, vy: 0.3+Math.random()*0.5, settled: false, size: 8+Math.random()*12 });
        var poemShown = false;
        function draw(t) {
            var w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            var sky = ctx.createLinearGradient(0, 0, 0, h); sky.addColorStop(0, '#8a8a7a'); sky.addColorStop(0.4, '#a09888'); sky.addColorStop(1, '#b0a898'); ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#706858'; ctx.beginPath(); ctx.moveTo(0, h*0.6); ctx.quadraticCurveTo(w*0.3, h*0.3, w*0.5, h*0.5); ctx.quadraticCurveTo(w*0.7, h*0.35, w, h*0.55); ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
            ctx.fillStyle = '#686050'; ctx.beginPath(); ctx.moveTo(0, h*0.7); ctx.quadraticCurveTo(w*0.25, h*0.55, w*0.5, h*0.65); ctx.quadraticCurveTo(w*0.75, h*0.5, w, h*0.65); ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
            var gY = h * 0.85, sc = 0;
            for (var i = 0; i < leaves.length; i++) { var l = leaves[i]; if (!l.settled) { l.y += l.vy; l.x += l.vx + Math.sin(t*0.001+i)*0.2; l.r += l.vr; if (l.y >= gY) { l.y = gY; l.settled = true; } } else { sc++; } ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.r); ctx.beginPath(); ctx.ellipse(0, 0, l.size, l.size*0.5, 0, 0, Math.PI*2); ctx.fillStyle = 'rgba(170,110,50,0.7)'; ctx.fill(); ctx.restore(); }
            if (sc >= leaves.length * 0.8 && !poemShown) { poemShown = true; document.getElementById('poem').classList.add('visible'); }
            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
