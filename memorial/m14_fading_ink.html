<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>墨迹 · 消逝</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow-y: auto; background: #e8e0d0; font-family: 'STKaiti', 'KaiTi', serif; }
        .letter { max-width: 400px; margin: 60px auto; padding: 40px 30px; background: linear-gradient(135deg, #f0e8d8, #e8e0d0); border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        .letter::before { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(0,0,0,0.05); border-radius: 1px; pointer-events: none; }
        .letter p { font-size: 15px; line-height: 2.5; color: rgba(60,50,40,0.8); letter-spacing: 2px; transition: opacity 8s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .letter p.fade { opacity: 0; filter: blur(4px); }
        .letter .sign { margin-top: 30px; text-align: right; font-size: 13px; color: rgba(60,50,40,0.5); transition: opacity 8s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .letter .sign.fade { opacity: 0; filter: blur(4px); }
        .hint { text-align: center; font-size: 11px; color: rgba(100,90,80,0.3); padding: 20px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="letter" id="letter">
        <p id="p1">见字如面。</p>
        <p id="p2">当你读到这封信的时候，</p>
        <p id="p3">我已经去往另一个世界了。</p>
        <p id="p4">不要难过，</p>
        <p id="p5">我只是换了一种方式陪伴你。</p>
        <p id="p6">每当风吹过窗棂，</p>
        <p id="p7">那是我在对你说话。</p>
        <div class="sign" id="sign">—— 想念你的人</div>
    </div>
    <div class="hint">向下滚动，墨迹会慢慢淡去</div>
    <script>
        var paragraphs = document.querySelectorAll('.letter p, .sign'), fadeStarted = false;
        window.addEventListener('scroll', function() {
            if (fadeStarted) return; fadeStarted = true;
            paragraphs.forEach(function(p, i) { setTimeout(function() { p.classList.add('fade'); }, i * 1200); });
        });
    </script>
</body>
</html>
