<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>孔明灯 · 寄托</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(180deg, #0a0e1a 0%, #0d1528 40%, #151d30 100%); font-family: -apple-system, 'PingFang SC', sans-serif; }
        .sky { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--dur, 3s) ease-in-out infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.15;} 50%{opacity:0.7;} }
        .lantern { position: absolute; width: 60px; height: 80px; opacity: 0; }
        .lantern-body { width: 100%; height: 100%; background: radial-gradient(ellipse at 50% 70%, rgba(255,183,77,0.4), rgba(255,152,0,0.15) 60%, rgba(255,152,0,0.05)); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: relative; box-shadow: 0 0 30px rgba(255,152,0,0.2), 0 0 60px rgba(255,152,0,0.1); }
        .lantern-body::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 10px; height: 6px; background: rgba(255,100,0,0.6); border-radius: 0 0 50% 50%; }
        .lantern-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 9px; color: rgba(255,200,100,0.8); text-align: center; max-width: 50px; word-break: break-all; line-height: 1.3; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; background: linear-gradient(to top, rgba(10,14,26,0.95), transparent); z-index: 10; }
        .input-area input { width: min(300px, 60vw); padding: 10px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; color: rgba(255,255,255,0.7); font-size: 14px; outline: none; font-family: inherit; letter-spacing: 1px; }
        .input-area input::placeholder { color: rgba(255,255,255,0.2); }
        .input-area button { padding: 10px 24px; background: rgba(255,152,0,0.15); border: 1px solid rgba(255,152,0,0.3); border-radius: 4px; color: rgba(255,200,100,0.8); font-size: 13px; cursor: pointer; letter-spacing: 3px; font-family: inherit; transition: all 3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .input-area button:active { background: rgba(255,152,0,0.3); }
        .prompt { position: fixed; bottom: 80px; left: 0; right: 0; text-align: center; font-size: 12px; color: rgba(200,195,185,0.3); letter-spacing: 4px; transition: opacity 3s ease; }
    </style>
</head>
<body>
    <div class="sky" id="sky"></div>
    <div class="prompt" id="prompt">写下想对TA说的话</div>
    <div class="input-area" id="input-area">
        <input type="text" id="msg" placeholder="写下思念..." maxlength="20">
        <button id="launch-btn">放飞</button>
    </div>
    <script>
        var sky = document.getElementById('sky');
        for (var i = 0; i < 120; i++) {
            var s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = 'left:' + Math.random()*100 + '%;top:' + Math.random()*80 + '%;width:' + (1+Math.random()*2) + 'px;height:' + (1+Math.random()*2) + 'px;--dur:' + (2+Math.random()*4) + 's;animation-delay:' + (Math.random()*3) + 's;';
            sky.appendChild(s);
        }
        var msgInput = document.getElementById('msg');
        var launchBtn = document.getElementById('launch-btn');
        var prompt = document.getElementById('prompt');
        launchBtn.addEventListener('click', launch);
        msgInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') launch(); });
        function launch() {
            var text = msgInput.value.trim() || '思念';
            msgInput.value = '';
            prompt.style.opacity = '0';
            var lantern = document.createElement('div');
            lantern.className = 'lantern';
            lantern.innerHTML = '<div class="lantern-body"><div class="lantern-text">' + text + '</div></div>';
            sky.appendChild(lantern);
            var sx = 20 + Math.random() * 60, sy = 90, t0 = Date.now();
            var dur = 12000 + Math.random() * 6000, amp = 15 + Math.random() * 20, spd = 0.0008 + Math.random() * 0.0005;
            lantern.style.left = sx + '%'; lantern.style.top = sy + '%'; lantern.style.opacity = '1';
            function anim() {
                var p = Math.min((Date.now() - t0) / dur, 1);
                var e = 1 - Math.pow(1 - p, 3);
                var y = sy - e * 100, x = sx + Math.sin((Date.now() - t0) * spd * Math.PI * 2) * amp * (1 - p * 0.5);
                var sc = 1 - p * 0.7, op = p > 0.7 ? 1 - (p - 0.7) / 0.3 : 1;
                lantern.style.top = y + '%'; lantern.style.left = x + '%'; lantern.style.transform = 'scale(' + sc + ')'; lantern.style.opacity = op;
                if (p < 1) requestAnimationFrame(anim); else sky.removeChild(lantern);
            }
            requestAnimationFrame(anim);
        }
    </script>
</body>
</html>
