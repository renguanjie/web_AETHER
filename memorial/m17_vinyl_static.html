<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>留声机 · 杂音</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a08; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'STSong', 'SimSun', serif; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: pointer; }
        .text { position: fixed; bottom: 12vh; left: 0; right: 0; text-align: center; font-size: 13px; color: rgba(200,195,185,0.15); letter-spacing: 4px; opacity: 0; transition: opacity 4s ease; }
        .text.visible { opacity: 1; }
        .hint { position: fixed; bottom: 6vh; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(200,195,185,0.1); letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="text" id="text">唱片还在转，但歌声已经远了</div>
    <div class="hint">点击唱片，播放那段记忆</div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        function resize() { canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr; ctx.scale(dpr, dpr); }
        resize(); window.addEventListener('resize', resize);

        var playing = false;
        var rotation = 0;
        var needleAngle = 0;
        var targetNeedle = 0;
        var audioCtx = null;
        var noiseGain = null;
        var started = false;

        function startAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var bufferSize = 2 * audioCtx.sampleRate;
            var noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            var output = noiseBuffer.getChannelData(0);
            for (var i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            var whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            var filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 800;
            filter.Q.value = 0.5;

            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;

            whiteNoise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            whiteNoise.start();
        }

        canvas.addEventListener('click', function() {
            if (!started) {
                started = true;
                playing = true;
                targetNeedle = 0.4;
                document.querySelector('.hint').style.opacity = '0';
                document.getElementById('text').classList.add('visible');
                startAudio();
                if (noiseGain) {
                    noiseGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 2);
                }
            }
        });
        canvas.addEventListener('touchstart', function() {
            if (!started) {
                started = true;
                playing = true;
                targetNeedle = 0.4;
                document.querySelector('.hint').style.opacity = '0';
                document.getElementById('text').classList.add('visible');
                startAudio();
                if (noiseGain) {
                    noiseGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 2);
                }
            }
        }, { passive: true });

        function drawRecord(cx, cy, r, t) {
            ctx.save();
            ctx.shadowColor = 'rgba(100,80,60,0.1)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.ellipse(cx, cy + r * 0.9, r * 1.2, r * 0.15, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1815';
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            var discGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
            discGrad.addColorStop(0, '#1a1a1a');
            discGrad.addColorStop(0.3, '#111');
            discGrad.addColorStop(0.7, '#0a0a0a');
            discGrad.addColorStop(1, '#151515');
            ctx.fillStyle = discGrad;
            ctx.fill();
            ctx.restore();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation);
            for (var i = 0; i < 20; i++) {
                var gr = r * 0.3 + (r * 0.65) * (i / 20);
                ctx.beginPath();
                ctx.arc(0, 0, gr, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(60,55,50,' + (0.1 + Math.sin(i) * 0.05) + ')';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
            var labelGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.28);
            labelGrad.addColorStop(0, '#2a2520');
            labelGrad.addColorStop(1, '#1a1510');
            ctx.fillStyle = labelGrad;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0a';
            ctx.fill();
            ctx.restore();

            var armBaseX = cx + r * 1.1;
            var armBaseY = cy - r * 0.8;
            var needleX = cx + Math.cos(Math.PI * 0.75 + needleAngle) * r * 0.85;
            var needleY = cy + Math.sin(Math.PI * 0.75 + needleAngle) * r * 0.85;

            ctx.beginPath();
            ctx.moveTo(armBaseX, armBaseY);
            ctx.quadraticCurveTo((armBaseX + needleX) / 2, (armBaseY + needleY) / 2 - 20, needleX, needleY);
            ctx.strokeStyle = 'rgba(80,75,65,0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(armBaseX, armBaseY, 5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(80,75,65,0.4)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(needleX, needleY, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,95,85,0.6)';
            ctx.fill();
        }

        function draw(t) {
            var w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);

            var bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.6);
            bg.addColorStop(0, '#151310');
            bg.addColorStop(1, '#0a0a08');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            if (playing) {
                rotation += 0.005;
            }
            needleAngle += (targetNeedle - needleAngle) * 0.02;

            var recordR = Math.min(w, h) * 0.25;
            drawRecord(w / 2, h * 0.42, recordR, t);

            requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
    </script>
</body>
</html>
