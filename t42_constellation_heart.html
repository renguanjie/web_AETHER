<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星图连线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: 'PingFang SC', sans-serif; }
        canvas { display: block; }
        .hint { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; font-size: 12px; color: #333; letter-spacing: 3px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(5,5,10,0.99)); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay-text { font-size: clamp(18px, 4vw, 28px); color: #fff; letter-spacing: 4px; font-weight: 200; text-align: center; opacity: 0; animation: rise 1.5s ease 0.5s forwards; }
        .overlay-text .pink { color: #ff6b9d; }
        .overlay-sub { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px; opacity: 0; animation: rise 1.5s ease 1.5s forwards; }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint">点击星星，将它们连成爱心</div>
    <div class="overlay" id="overlay">
        <div class="overlay-text">星空万顷，<span class="pink">只为你连线</span></div>
        <div class="overlay-sub">CONSTELLATION COMPLETE — HEART FORMED</div>
    </div>
    <script>
        var canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'), W, H;
        function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
        resize(); window.addEventListener('resize', function() { resize(); buildStars(); });

        var heartStars = [];
        var bgStars = [];
        var connected = [];
        var total = 0, count = 0;

        function buildStars() {
            heartStars = []; bgStars = []; connected = []; count = 0;
            var cx = W / 2, cy = H / 2, sc = Math.min(W, H) * 0.22;
            for (var t = 0; t < Math.PI * 2; t += 0.15) {
                var hx = 16 * Math.pow(Math.sin(t), 3);
                var hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                heartStars.push({ x: cx + hx * sc / 16, y: cy + hy * sc / 16, connected: false });
            }
            total = heartStars.length;
            for (var i = 0; i < 100; i++) {
                bgStars.push({ x: Math.random() * W, y: Math.random() * H, s: 0.5 + Math.random() * 1.5, p: Math.random() * Math.PI * 2 });
            }
        }
        buildStars();

        canvas.addEventListener('click', function(e) {
            var mx = e.clientX, my = e.clientY;
            for (var i = 0; i < heartStars.length; i++) {
                if (!heartStars[i].connected) {
                    var dx = mx - heartStars[i].x, dy = my - heartStars[i].y;
                    if (dx * dx + dy * dy < 900) {
                        heartStars[i].connected = true;
                        count++;
                        if (count >= total) setTimeout(function() { document.getElementById('overlay').classList.add('visible'); }, 500);
                        break;
                    }
                }
            }
        });

        var time = 0;
        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, W, H);
            for (var i = 0; i < bgStars.length; i++) {
                var s = bgStars[i], a = 0.3 + Math.sin(time + s.p) * 0.3;
                ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2); ctx.fill();
            }
            // Lines between consecutive connected stars
            ctx.strokeStyle = 'rgba(255,107,157,0.3)'; ctx.lineWidth = 1;
            var last = -1;
            for (var j = 0; j < heartStars.length; j++) {
                if (heartStars[j].connected) {
                    if (last >= 0) {
                        ctx.beginPath(); ctx.moveTo(heartStars[last].x, heartStars[last].y);
                        ctx.lineTo(heartStars[j].x, heartStars[j].y); ctx.stroke();
                    }
                    last = j;
                    ctx.fillStyle = '#ff6b9d'; ctx.shadowColor = '#ff6b9d'; ctx.shadowBlur = 8;
                    ctx.beginPath(); ctx.arc(heartStars[j].x, heartStars[j].y, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            // Unconnected heart stars (dim)
            for (var k = 0; k < heartStars.length; k++) {
                if (!heartStars[k].connected) {
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath(); ctx.arc(heartStars[k].x, heartStars[k].y, 2, 0, Math.PI * 2); ctx.fill();
                }
            }
            ctx.fillStyle = '#444'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('已连 ' + count + ' / ' + total, W / 2, 30);
            time += 0.02; requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
