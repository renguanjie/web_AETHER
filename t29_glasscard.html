<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心动黑卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0a0a;
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        .bg-orbs {
            position: absolute; inset: 0; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            mix-blend-mode: screen;
        }
        .orb:nth-child(1) {
            width: 200px; height: 200px;
            background: #ff6b9d;
            top: 20%; left: 10%;
            animation: float1 8s ease-in-out infinite;
        }
        .orb:nth-child(2) {
            width: 150px; height: 150px;
            background: #c084fc;
            top: 60%; right: 10%;
            animation: float2 10s ease-in-out infinite;
        }
        .orb:nth-child(3) {
            width: 120px; height: 120px;
            background: #4fc3f7;
            bottom: 10%; left: 40%;
            animation: float3 12s ease-in-out infinite;
        }
        @keyframes float1 {
            0%,100% { transform: translate(0, 0); }
            50% { transform: translate(60px, -40px); }
        }
        @keyframes float2 {
            0%,100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 30px); }
        }
        @keyframes float3 {
            0%,100% { transform: translate(0, 0); }
            50% { transform: translate(40px, -50px); }
        }

        .card-wrapper {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            perspective: 1000px;
        }
        .card-label {
            font-size: 10px; color: #444; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 20px;
            opacity: 0; animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .glass-card {
            width: min(380px, 85vw);
            aspect-ratio: 1.586;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            padding: 30px; position: relative;
            overflow: hidden; cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
            opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards;
        }
        .card-shine {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 60%);
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .card-chip {
            width: 40px; height: 30px; border-radius: 6px;
            background: linear-gradient(135deg, #d4af37, #f0db4f);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .card-contactless { font-size: 20px; opacity: 0.5; }

        .card-number {
            position: absolute; bottom: 70px; left: 30px;
            font-size: clamp(14px, 3vw, 18px);
            color: rgba(255,255,255,0.7);
            letter-spacing: 4px;
            font-family: 'SF Mono', monospace;
        }
        .card-bottom {
            position: absolute; bottom: 30px; left: 30px; right: 30px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .card-holder { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
        .card-name { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; }
        .card-valid { font-size: 10px; color: rgba(255,255,255,0.4); text-align: right; }
        .card-valid span { font-size: 13px; color: rgba(255,255,255,0.7); display: block; margin-top: 2px; }

        .card-brand {
            position: absolute; top: 25px; right: 30px;
            font-size: 11px; color: rgba(255,255,255,0.3);
            letter-spacing: 3px;
        }

        .reveal-text {
            margin-top: 30px; text-align: center;
            max-width: 380px; padding: 0 20px;
            opacity: 0; transform: translateY(20px);
            transition: all 1s ease;
        }
        .reveal-text.visible { opacity: 1; transform: translateY(0); }
        .reveal-text .main {
            font-size: clamp(16px, 4vw, 22px); color: #fff;
            letter-spacing: 2px; line-height: 1.8; font-weight: 200;
        }
        .reveal-text .pink { color: #ff6b9d; font-weight: 500; }

        .final-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99));
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .final-overlay.visible { opacity: 1; pointer-events: auto; }
        .final-text {
            font-size: clamp(18px, 4vw, 30px); color: #fff;
            letter-spacing: 4px; font-weight: 200; text-align: center;
            line-height: 1.8; opacity: 0; animation: rise 1.5s ease 0.5s forwards;
        }
        .final-text .pink { color: #ff6b9d; }
        .final-sub {
            font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px;
            opacity: 0; animation: rise 1.5s ease 1.5s forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="card-wrapper">
        <div class="card-label">UNLIMITED LOVE CARD</div>
        <div class="glass-card" id="card">
            <div class="card-shine" id="shine"></div>
            <div class="card-brand">AETHER</div>
            <div class="card-top">
                <div class="card-chip"></div>
                <div class="card-contactless">&#9655;))</div>
            </div>
            <div class="card-number">LOVE **** 520 1314</div>
            <div class="card-bottom">
                <div>
                    <div class="card-holder">Card Holder</div>
                    <div class="card-name">YOU &amp; ME</div>
                </div>
                <div>
                    <div class="card-valid">Valid Thru</div>
                    <span>&infin;/&infin;</span>
                </div>
            </div>
        </div>
        <div class="reveal-text" id="reveal">
            <div class="main">额度：<span class="pink">无限</span><br>
            年费：<span class="pink">0</span><br>
            有效期：<span class="pink">永远</span><br><br>
            这张卡只能刷一次——<br>
            <span class="pink">你愿意接受吗？</span></div>
        </div>
    </div>

    <div class="final-overlay" id="final">
        <div class="final-text">交易成功<br><span class="pink">无限额度的爱，已到账</span></div>
        <div class="final-sub">PAYMENT APPROVED — UNLIMITED LOVE ACTIVATED</div>
    </div>

    <script>
        var card = document.getElementById('card');
        var shine = document.getElementById('shine');
        var revealed = false;

        card.addEventListener('mousemove', function(e) {
            var rect = card.getBoundingClientRect();
            var x = (e.clientX - rect.left) / rect.width;
            var y = (e.clientY - rect.top) / rect.height;
            var rotateX = (y - 0.5) * -20;
            var rotateY = (x - 0.5) * 20;
            card.style.transform = 'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';
            shine.style.opacity = '1';
            shine.style.background = 'radial-gradient(circle at ' + (x * 100) + '% ' + (y * 100) + '%, rgba(255,255,255,0.2), transparent 60%)';
        });

        card.addEventListener('mouseleave', function() {
            card.style.transform = 'rotateX(0) rotateY(0)';
            shine.style.opacity = '0';
        });

        card.addEventListener('click', function() {
            if (!revealed) {
                revealed = true;
                document.getElementById('reveal').classList.add('visible');
                setTimeout(function() {
                    document.getElementById('final').classList.add('visible');
                }, 3000);
            }
        });
    </script>
</body>
</html>
