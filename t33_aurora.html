<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>极光下的告白</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #020208;
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        .sky {
            position: absolute; inset: 0;
            overflow: hidden;
        }

        /* Aurora layers */
        .aurora {
            position: absolute; width: 200%; height: 60%;
            top: 10%; left: -50%;
            filter: blur(80px);
            mix-blend-mode: screen;
        }
        .aurora-1 {
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 255, 128, 0.3) 20%,
                rgba(0, 200, 255, 0.4) 40%,
                rgba(100, 0, 255, 0.3) 60%,
                rgba(0, 255, 128, 0.2) 80%,
                transparent 100%
            );
            animation: aurora1 12s ease-in-out infinite;
        }
        .aurora-2 {
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 255, 200, 0.2) 30%,
                rgba(128, 0, 255, 0.3) 50%,
                rgba(0, 128, 255, 0.2) 70%,
                transparent 100%
            );
            animation: aurora2 15s ease-in-out infinite;
        }
        .aurora-3 {
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 0, 128, 0.15) 25%,
                rgba(0, 255, 128, 0.2) 50%,
                rgba(0, 200, 255, 0.15) 75%,
                transparent 100%
            );
            animation: aurora3 18s ease-in-out infinite;
        }
        @keyframes aurora1 {
            0%,100% { transform: translateX(0) scaleY(1) rotate(0deg); }
            33% { transform: translateX(5%) scaleY(1.3) rotate(-2deg); }
            66% { transform: translateX(-3%) scaleY(0.8) rotate(1deg); }
        }
        @keyframes aurora2 {
            0%,100% { transform: translateX(0) scaleY(1.2) rotate(1deg); }
            50% { transform: translateX(-5%) scaleY(0.7) rotate(-2deg); }
        }
        @keyframes aurora3 {
            0%,100% { transform: translateX(0) scaleY(0.8) rotate(-1deg); }
            50% { transform: translateX(3%) scaleY(1.4) rotate(2deg); }
        }

        /* Stars */
        .stars-container { position: absolute; inset: 0; }
        .star {
            position: absolute; width: 2px; height: 2px;
            background: #fff; border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Snow silhouette ground */
        .ground {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 15%;
            background: linear-gradient(to top, #0a0a15, transparent);
        }

        .text-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: flex-end; align-items: center;
            padding: 40px 24px 60px;
        }
        .main-text {
            font-size: clamp(18px, 4vw, 28px);
            color: #fff; letter-spacing: 6px;
            font-weight: 200; text-align: center;
            line-height: 2;
            opacity: 0; animation: fadeUp 2s ease 1s forwards;
        }
        .main-text .pink {
            color: #ff6b9d; font-weight: 400;
            text-shadow: 0 0 20px rgba(255,107,157,0.3);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="sky">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
        <div class="stars-container" id="stars"></div>
        <div class="ground"></div>
    </div>

    <div class="text-overlay">
        <div class="main-text">
            在这片极光之下<br>
            我只想<span class="pink">和你一起</span>
        </div>
    </div>

    <script>
        var starsContainer = document.getElementById('stars');
        for (var i = 0; i < 80; i++) {
            var star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 60 + '%';
            star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
            star.style.setProperty('--delay', (Math.random() * 4) + 's');
            if (Math.random() > 0.7) {
                star.style.width = '3px';
                star.style.height = '3px';
            }
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
