<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>系统更新：爱情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, 'PingFang SC', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .update-screen { text-align: center; max-width: 350px; padding: 20px; }
        .update-icon { font-size: 64px; margin-bottom: 20px; }
        .update-title { font-size: 22px; font-weight: 300; margin-bottom: 8px; }
        .update-version { font-size: 12px; color: #555; margin-bottom: 30px; }
        .update-features { text-align: left; margin-bottom: 30px; }
        .feature-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; font-size: 13px; color: #aaa; line-height: 1.5; }
        .feature-icon { color: #4caf50; flex-shrink: 0; }
        .progress-section { margin-bottom: 30px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.3s ease; }
        .progress-text { font-size: 11px; color: #555; margin-top: 8px; }
        .update-btn { padding: 14px 40px; background: #fff; color: #000; border: none; border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; letter-spacing: 2px; }
        .update-btn.installing { background: rgba(255,255,255,0.2); color: #fff; pointer-events: none; }
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99)); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay-text { font-size: clamp(18px, 4vw, 28px); color: #fff; letter-spacing: 4px; text-align: center; opacity: 0; animation: rise 1.5s ease 0.5s forwards; }
        .overlay-text .pink { color: #ff6b9d; }
        .overlay-sub { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px; opacity: 0; animation: rise 1.5s ease 1.5s forwards; }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="update-screen">
        <div class="update-icon">&#128240;</div>
        <div class="update-title">系统更新</div>
        <div class="update-version">LoveOS 5.2.0 — 爱情特别版</div>
        <div class="update-features">
            <div class="feature-item"><span class="feature-icon">&#9989;</span>新增：心跳加速功能</div>
            <div class="feature-item"><span class="feature-icon">&#9989;</span>优化：想念性能提升 520%</div>
            <div class="feature-item"><span class="feature-icon">&#9989;</span>修复：单身模式的遗留问题</div>
            <div class="feature-item"><span class="feature-icon">&#9989;</span>新增：永久陪伴模块</div>
        </div>
        <div class="progress-section"><div class="progress-bar"><div class="progress-fill" id="update-progress"></div></div><div class="progress-text" id="update-text">准备安装...</div></div>
        <button class="update-btn" id="update-btn">立即安装</button>
    </div>
    <div class="overlay" id="overlay">
        <div class="overlay-text">更新完成<br><span class="pink">我们已进入热恋模式</span></div>
        <div class="overlay-sub">UPDATE COMPLETE — LOVE MODE ACTIVATED</div>
    </div>
    <script>
        var btn = document.getElementById('update-btn'), bar = document.getElementById('update-progress'), text = document.getElementById('update-text');
        btn.addEventListener('click', function() {
            btn.classList.add('installing'); btn.textContent = '安装中...';
            var pct = 0, stages = ['下载更新', '验证文件', '安装组件', '配置系统', '正在完成'], sIdx = 0;
            function tick() {
                pct += 1 + Math.random() * 2;
                if (pct >= 100) { pct = 100; bar.style.width = '100%'; text.textContent = '安装完成！'; setTimeout(function() { document.getElementById('overlay').classList.add('visible'); }, 800); return; }
                bar.style.width = pct + '%';
                var ns = Math.min(Math.floor(pct / 20), stages.length - 1);
                if (ns !== sIdx) { sIdx = ns; text.textContent = stages[sIdx] + '...'; }
                setTimeout(tick, 100 + Math.random() * 100);
            }
            tick();
        });
    </script>
</body>
</html>
