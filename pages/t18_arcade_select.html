<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格斗选人</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; overflow: hidden; background: #0a0a0a;
            font-family: 'Courier New', 'PingFang SC', monospace; color: #fff;
        }

        .back-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            padding: 6px 14px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px; transition: all 0.3s;
        }
        .back-btn:hover { color: #D4AF37; }

        .arcade-header { text-align: center; padding: 30px 20px 15px; }
        .arcade-title {
            font-size: clamp(20px, 5vw, 36px); font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(90deg, #ff0, #f80, #f00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: titleGlow 2s ease-in-out infinite alternate;
        }
        @keyframes titleGlow { from { filter: brightness(1); } to { filter: brightness(1.3); } }
        .arcade-sub { font-size: 13px; color: #888; letter-spacing: 3px; margin-top: 8px; }

        .character-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(min(140px, 40vw), 1fr));
            gap: 12px; padding: 20px; max-width: 800px; margin: 0 auto;
        }

        .char-card {
            background: #1a1a1a; border: 2px solid #333; border-radius: 8px;
            padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .char-card:hover { border-color: #ff0; transform: translateY(-4px); }
        .char-card.selected { border-color: #ff0; box-shadow: 0 0 20px rgba(255,255,0,0.3); }

        .char-avatar {
            width: 60px; height: 60px; margin: 0 auto 10px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 32px;
        }
        .char-name { font-size: clamp(13px, 3vw, 16px); font-weight: 700; color: #fff; letter-spacing: 2px; margin-bottom: 6px; }
        .char-title { font-size: 10px; color: #888; letter-spacing: 1px; }

        .char-stats { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
        .stat-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
        .stat-fill.heart { background: linear-gradient(90deg, #ff6b9d, #ff4081); }
        .stat-fill.courage { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .char-label { display: flex; justify-content: space-between; font-size: 9px; color: #666; margin-top: 2px; }

        .selected-display {
            text-align: center; padding: 20px;
            opacity: 0; transform: translateY(20px); transition: all 0.8s ease;
        }
        .selected-display.visible { opacity: 1; transform: translateY(0); }
        .selected-avatar { font-size: 60px; margin-bottom: 10px; animation: bounce 0.5s ease; }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
        .selected-name { font-size: clamp(20px,5vw,32px); font-weight: 900; color: #ff0; letter-spacing: 4px; }

        .fight-text {
            text-align: center; padding: 10px;
            font-size: clamp(16px,4vw,24px); color: #ff6b9d; letter-spacing: 4px;
            opacity: 0; transition: opacity 1s ease;
        }
        .fight-text.visible { opacity: 1; }

        .vs-flash {
            position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .vs-flash.visible { opacity: 1; pointer-events: auto; }
        .vs-text {
            font-size: clamp(48px,15vw,100px); font-weight: 900;
            background: linear-gradient(90deg, #ff0, #f80, #f00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: vsPulse 1s ease infinite;
        }
        @keyframes vsPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
        .vs-sub { font-size: clamp(14px,3vw,20px); color: rgba(255,255,255,0.5); letter-spacing: 3px; margin-top: 20px; }
    </style>
</head>
<body>
    <a href="portal.html" class="back-btn">&larr; 返回门户</a>

    <div class="arcade-header">
        <div class="arcade-title">SELECT YOUR PLAYER</div>
        <div class="arcade-sub">选择你要表白的方式</div>
    </div>

    <div class="character-grid" id="charGrid"></div>

    <div class="selected-display" id="selectedDisplay">
        <div class="selected-avatar" id="selectedAvatar"></div>
        <div class="selected-name" id="selectedName"></div>
    </div>

    <div class="fight-text" id="fightText">FIGHT! 去表白吧！</div>

    <div class="vs-flash" id="vsFlash">
        <div class="vs-text">VS</div>
        <div class="vs-sub">你的对手是：犹豫不决的自己</div>
    </div>

    <script>
        const characters = [
            { name:'直球勇者', title:'直接说出来的才是真爱', emoji:'&#129340;', heart:95, courage:90 },
            { name:'文艺诗人', title:'用文字感动你的心', emoji:'&#128221;', heart:85, courage:60 },
            { name:'行动派战士', title:'行动胜过千言万语', emoji:'&#128170;', heart:75, courage:95 },
            { name:'默默守护者', title:'陪伴是最长情的告白', emoji:'&#129326;', heart:90, courage:40 },
            { name:'惊喜制造师', title:'让每一天都充满浪漫', emoji:'&#127873;', heart:80, courage:85 },
            { name:'真心话骑士', title:'把真心全部交给你', emoji:'&#9813;', heart:100, courage:70 },
        ];

        const grid = document.getElementById('charGrid');
        const selectedDisplay = document.getElementById('selectedDisplay');
        const selectedAvatar = document.getElementById('selectedAvatar');
        const selectedName = document.getElementById('selectedName');
        const fightText = document.getElementById('fightText');
        const vsFlash = document.getElementById('vsFlash');

        characters.forEach((char) => {
            const card = document.createElement('div');
            card.className = 'char-card';
            card.innerHTML = `
                <div class="char-avatar">${char.emoji}</div>
                <div class="char-name">${char.name}</div>
                <div class="char-title">${char.title}</div>
                <div class="char-stats">
                    <div><div class="stat-bar"><div class="stat-fill heart" style="width:0%" data-val="${char.heart}"></div></div><div class="char-label"><span>心意</span><span>${char.heart}%</span></div></div>
                    <div><div class="stat-bar"><div class="stat-fill courage" style="width:0%" data-val="${char.courage}"></div></div><div class="char-label"><span>勇气</span><span>${char.courage}%</span></div></div>
                </div>
            `;
            grid.appendChild(card);

            card.addEventListener('click', () => {
                document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedDisplay.classList.add('visible');
                selectedAvatar.innerHTML = char.emoji;
                selectedName.textContent = char.name;
                setTimeout(() => {
                    card.querySelectorAll('.stat-fill').forEach(f => { f.style.width = f.dataset.val + '%'; });
                }, 100);
                setTimeout(() => fightText.classList.add('visible'), 500);
                setTimeout(() => vsFlash.classList.add('visible'), 1500);
            });
        });

        vsFlash.addEventListener('click', () => vsFlash.classList.remove('visible'));
    </script>
</body>
</html>
