<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>桌面情书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
        }
        .desktop {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            position: relative;
        }
        .menubar {
            height: 28px; background: rgba(30,30,30,0.85);
            backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 12px;
            font-size: 12px; color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .menu-apple { font-size: 14px; margin-right: 16px; }
        .menu-item { margin-right: 14px; opacity: 0.8; }
        .menu-clock { margin-left: auto; font-variant-numeric: tabular-nums; }

        .window {
            position: absolute; border-radius: 10px;
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .window.visible { opacity: 1; transform: scale(1); }

        .win-titlebar {
            display: flex; align-items: center; padding: 10px 14px;
            background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .win-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .win-dot.r { background: #ff5f57; }
        .win-dot.y { background: #febc2e; }
        .win-dot.g { background: #28c840; }
        .win-title {
            flex: 1; text-align: center; font-size: 11px;
            color: #888; letter-spacing: 1px;
        }
        .win-body { padding: 16px; }

        /* Music Player */
        .music-player {
            top: 60px; left: max(20px, 5vw);
            width: min(280px, 60vw);
        }
        .album-art {
            width: 100%; aspect-ratio: 1;
            border-radius: 8px; margin-bottom: 12px;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #4fc3f7);
            background-size: 300% 300%;
            animation: gradientMove 6s ease infinite;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .song-title { font-size: 13px; color: #fff; font-weight: 600; }
        .song-artist { font-size: 11px; color: #888; margin-top: 2px; }
        .equalizer {
            display: flex; gap: 3px; margin-top: 12px;
            justify-content: center;
        }
        .eq-bar {
            width: 4px; background: #ff6b9d; border-radius: 2px;
            animation: eqBounce 0.8s ease-in-out infinite alternate;
        }
        @keyframes eqBounce {
            from { height: 4px; }
            to { height: 20px; }
        }

        /* Photos Window */
        .photos-window {
            top: 80px; right: max(20px, 5vw);
            width: min(300px, 55vw);
        }
        .photo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .photo-thumb {
            aspect-ratio: 1; border-radius: 6px;
            animation: photoFade 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes photoFade { to { opacity: 1; } }

        /* Dialog */
        .dialog-window {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: min(340px, 85vw);
        }
        .dialog-window.visible {
            transform: translate(-50%, -50%) scale(1);
        }
        .dialog-body { padding: 24px; text-align: center; }
        .dialog-icon { font-size: 32px; margin-bottom: 12px; }
        .dialog-title { font-size: 15px; color: #fff; font-weight: 600; margin-bottom: 6px; }
        .dialog-text { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 20px; }
        .dialog-btns { display: flex; gap: 8px; justify-content: center; }
        .dialog-btn {
            padding: 8px 24px; border-radius: 8px;
            font-size: 13px; cursor: pointer;
            font-family: inherit; border: none; transition: all 0.2s ease;
        }
        .dialog-btn.primary {
            background: linear-gradient(135deg, #ff6b9d, #c084fc);
            color: #fff;
        }
        .dialog-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff; border: 1px solid rgba(255,255,255,0.15);
        }

        .final-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99));
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .final-overlay.visible { opacity: 1; pointer-events: auto; }
        .final-text {
            font-size: clamp(16px, 4vw, 28px); color: #fff;
            letter-spacing: 4px; font-weight: 200; text-align: center;
            line-height: 1.8; opacity: 0; animation: rise 1.5s ease 0.5s forwards;
        }
        .final-text .pink { color: #ff6b9d; font-weight: 500; }
        .final-sub {
            font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px;
            opacity: 0; animation: rise 1.5s ease 1.5s forwards;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .music-player { width: 60vw; left: 10px; top: 50px; }
            .photos-window { width: 55vw; right: 10px; top: 50px; }
            .dialog-window { width: 85vw; }
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="menubar">
            <span class="menu-apple">&#63743;</span>
            <span class="menu-item">LoveOS</span>
            <span class="menu-item">文件</span>
            <span class="menu-item">编辑</span>
            <span class="menu-item">帮助</span>
            <span class="menu-clock" id="clock"></span>
        </div>

        <!-- Music Player -->
        <div class="window music-player" id="win-music">
            <div class="win-titlebar">
                <div class="win-dot r"></div><div class="win-dot y"></div><div class="win-dot g"></div>
                <div class="win-title">Music</div>
            </div>
            <div class="win-body">
                <div class="album-art">&#127925;</div>
                <div class="song-title">Perfect</div>
                <div class="song-artist">Ed Sheeran &bull; 正在播放</div>
                <div class="equalizer">
                    <div class="eq-bar" style="animation-delay:0s"></div>
                    <div class="eq-bar" style="animation-delay:0.1s"></div>
                    <div class="eq-bar" style="animation-delay:0.2s"></div>
                    <div class="eq-bar" style="animation-delay:0.3s"></div>
                    <div class="eq-bar" style="animation-delay:0.15s"></div>
                    <div class="eq-bar" style="animation-delay:0.25s"></div>
                    <div class="eq-bar" style="animation-delay:0.05s"></div>
                    <div class="eq-bar" style="animation-delay:0.35s"></div>
                    <div class="eq-bar" style="animation-delay:0.12s"></div>
                    <div class="eq-bar" style="animation-delay:0.22s"></div>
                </div>
            </div>
        </div>

        <!-- Photos -->
        <div class="window photos-window" id="win-photos">
            <div class="win-titlebar">
                <div class="win-dot r"></div><div class="win-dot y"></div><div class="win-dot g"></div>
                <div class="win-title">Photos</div>
            </div>
            <div class="win-body">
                <div class="photo-grid" id="photo-grid"></div>
            </div>
        </div>

        <!-- Dialog -->
        <div class="window dialog-window" id="win-dialog">
            <div class="win-titlebar">
                <div class="win-dot r"></div><div class="win-dot y"></div><div class="win-dot g"></div>
                <div class="win-title">系统通知</div>
            </div>
            <div class="dialog-body">
                <div class="dialog-icon">&#128151;</div>
                <div class="dialog-title">检测到心跳异常</div>
                <div class="dialog-text">系统检测到您正在频繁想念某人。<br>是否立即建立永久连接？</div>
                <div class="dialog-btns">
                    <button class="dialog-btn secondary" id="btn-later">稍后再说</button>
                    <button class="dialog-btn primary" id="btn-now">立即连接</button>
                </div>
            </div>
        </div>
    </div>

    <div class="final-overlay" id="final">
        <div class="final-text">绑定成功<br><span class="pink">我们已永久连接</span></div>
        <div class="final-sub">SYSTEM PAIRED — CONNECTION PERMANENT</div>
    </div>

    <script>
        // Clock
        function updateClock() {
            var now = new Date();
            var h = String(now.getHours()).padStart(2, '0');
            var m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }
        updateClock();
        setInterval(updateClock, 10000);

        // Photo thumbnails
        var colors = [
            'linear-gradient(135deg,#ff9a9e,#fad0c4)',
            'linear-gradient(135deg,#a18cd1,#fbc2eb)',
            'linear-gradient(135deg,#ffecd2,#fcb69f)',
            'linear-gradient(135deg,#84fab0,#8fd3f4)',
            'linear-gradient(135deg,#fbc2eb,#a6c1ee)',
            'linear-gradient(135deg,#fdcbf1,#e6dee9)',
        ];
        var emojis = ['&#127775;', '&#127752;', '&#127860;', '&#127912;', '&#127749;', '&#10084;'];
        var grid = document.getElementById('photo-grid');
        for (var i = 0; i < 6; i++) {
            var div = document.createElement('div');
            div.className = 'photo-thumb';
            div.style.background = colors[i];
            div.style.animationDelay = (1.5 + i * 0.2) + 's';
            div.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:24px;">' + emojis[i] + '</div>';
            grid.appendChild(div);
        }

        // Window reveal sequence
        setTimeout(function() { document.getElementById('win-music').classList.add('visible'); }, 500);
        setTimeout(function() { document.getElementById('win-photos').classList.add('visible'); }, 1000);
        setTimeout(function() { document.getElementById('win-dialog').classList.add('visible'); }, 2500);

        // Both buttons trigger love confirmation
        document.getElementById('btn-now').addEventListener('click', confirm);
        document.getElementById('btn-later').addEventListener('click', function() {
            document.getElementById('btn-later').textContent = '不行，必须现在';
            document.getElementById('btn-later').style.background = 'linear-gradient(135deg,#ff6b9d,#c084fc)';
            document.getElementById('btn-later').style.border = 'none';
            document.getElementById('btn-later').style.color = '#fff';
            setTimeout(function() { confirm(); }, 1000);
        });

        function confirm() {
            setTimeout(function() {
                document.getElementById('final').classList.add('visible');
            }, 500);
        }
    </script>
</body>
</html>
