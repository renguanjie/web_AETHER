<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码情书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            font-family: 'Courier New', 'PingFang SC', monospace;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .back-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            padding: 6px 14px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px; transition: all 0.3s;
        }
        .back-btn:hover { color: #D4AF37; }

        .lock-container { text-align: center; position: relative; z-index: 10; }

        .lock-title {
            font-size: clamp(18px, 4vw, 28px); color: rgba(255,255,255,0.7);
            letter-spacing: 4px; margin-bottom: 8px;
        }
        .lock-hint {
            font-size: 13px; color: rgba(255,255,255,0.3);
            letter-spacing: 2px; margin-bottom: 40px;
        }

        .dial-row {
            display: flex; justify-content: center; gap: clamp(12px, 3vw, 24px);
            margin-bottom: 40px;
        }
        .dial { display: flex; flex-direction: column; align-items: center; }

        .dial-display {
            width: clamp(50px, 12vw, 70px); height: clamp(50px, 12vw, 70px);
            background: #0d0d1a; border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px; display: flex; justify-content: center;
            align-items: center; font-size: clamp(24px, 6vw, 36px);
            color: #fff; cursor: pointer; user-select: none;
            transition: all 0.3s;
        }
        .dial-display:hover { border-color: rgba(255,107,157,0.5); }
        .dial-display.correct { border-color: #27c93f; color: #27c93f; }
        .dial-display.wrong { border-color: #ff5f56; color: #ff5f56; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .dial-label {
            font-size: 10px; color: rgba(255,255,255,0.3);
            letter-spacing: 1px; margin-top: 8px;
        }

        .unlock-btn {
            padding: 12px 40px; font-size: 16px; letter-spacing: 4px;
            color: rgba(255,255,255,0.5); background: transparent;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
            cursor: pointer; transition: all 0.3s;
        }
        .unlock-btn:hover { color: #fff; border-color: rgba(255,107,157,0.5); }

        .letter-overlay {
            position: fixed; inset: 0; z-index: 50;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }
        .letter-overlay.visible { opacity: 1; pointer-events: auto; }

        .letter-card {
            width: min(500px, 90vw); background: #faf8f5;
            border-radius: 12px; padding: 40px 35px;
            transform: scale(0.8) translateY(30px);
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        .letter-overlay.visible .letter-card { transform: scale(1) translateY(0); }

        .letter-card h2 {
            font-size: clamp(20px, 5vw, 28px); color: #1a1a2e;
            letter-spacing: 3px; margin-bottom: 20px; text-align: center;
        }
        .letter-card p {
            font-size: clamp(14px, 3vw, 17px); color: #555;
            line-height: 2; letter-spacing: 1px; margin-bottom: 12px;
        }
        .letter-card .signature {
            text-align: right; color: #1a1a2e;
            font-size: 18px; font-style: italic; margin-top: 25px;
        }

        .hint-bubble {
            position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
            font-size: 13px; color: rgba(255,255,255,0.2);
            letter-spacing: 2px; text-align: center;
        }

        .particle {
            position: fixed; width: 4px; height: 4px; border-radius: 50%;
            pointer-events: none; z-index: 60;
        }
    </style>
</head>
<body>
    <a href="portal.html" class="back-btn">&larr; 返回门户</a>

    <div class="lock-container" id="lockContainer">
        <div class="lock-title">密码情书</div>
        <div class="lock-hint">输入我们第一次相遇的日期</div>

        <div class="dial-row">
            <div class="dial">
                <div class="dial-display" data-value="0">0</div>
                <div class="dial-label">月</div>
            </div>
            <div class="dial">
                <div class="dial-display" data-value="0">0</div>
                <div class="dial-label">日</div>
            </div>
            <div class="dial">
                <div class="dial-display" data-value="0">0</div>
                <div class="dial-label">十位</div>
            </div>
            <div class="dial">
                <div class="dial-display" data-value="0">0</div>
                <div class="dial-label">个位</div>
            </div>
        </div>

        <button class="unlock-btn" id="unlockBtn">解 锁</button>
    </div>

    <div class="hint-bubble">提示：密码是 5201</div>

    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-card">
            <h2>密码正确</h2>
            <p>你竟然还记得。</p>
            <p>这一天，是我们故事的开始。</p>
            <p>从那天起，我的世界变得不一样了。</p>
            <p>每一次想起你，嘴角都会不自觉地上扬。</p>
            <p>今天，我想正式告诉你——</p>
            <p style="font-size:clamp(18px,4vw,24px); color:#ff6b9d; text-align:center; margin-top:20px; letter-spacing:4px;">我喜欢你</p>
            <div class="signature">—— 一个默默喜欢你的人</div>
        </div>
    </div>

    <script>
        const CORRECT_CODE = ['5', '2', '0', '1'];
        const displays = document.querySelectorAll('.dial-display');
        const unlockBtn = document.getElementById('unlockBtn');
        const letterOverlay = document.getElementById('letterOverlay');

        displays.forEach(d => {
            d.addEventListener('click', () => {
                let v = parseInt(d.dataset.value);
                v = (v + 1) % 10;
                d.dataset.value = v;
                d.textContent = v;
                d.classList.remove('correct', 'wrong');
            });

            let holdTimer = null;
            let holdInterval = null;
            d.addEventListener('mousedown', startHold);
            d.addEventListener('touchstart', startHold);
            d.addEventListener('mouseup', stopHold);
            d.addEventListener('touchend', stopHold);

            function startHold(e) {
                e.preventDefault();
                holdTimer = setTimeout(() => {
                    holdInterval = setInterval(() => {
                        let v = parseInt(d.dataset.value);
                        v = (v - 1 + 10) % 10;
                        d.dataset.value = v;
                        d.textContent = v;
                        d.classList.remove('correct', 'wrong');
                    }, 100);
                }, 500);
            }
            function stopHold() { clearTimeout(holdTimer); clearInterval(holdInterval); }
        });

        unlockBtn.addEventListener('click', () => {
            const current = Array.from(displays).map(d => d.dataset.value);
            const isCorrect = current.every((v, i) => v === CORRECT_CODE[i]);

            if (isCorrect) {
                displays.forEach(d => d.classList.add('correct'));
                setTimeout(() => {
                    letterOverlay.classList.add('visible');
                    createParticles();
                }, 500);
            } else {
                displays.forEach((d, i) => {
                    if (current[i] !== CORRECT_CODE[i]) d.classList.add('wrong');
                });
                setTimeout(() => {
                    displays.forEach(d => d.classList.remove('wrong'));
                }, 600);
            }
        });

        function createParticles() {
            const colors = ['#ff6b9d', '#c084fc', '#60a5fa', '#27c93f', '#ffbd2e'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `left:50%;top:50%;background:${colors[i%colors.length]};width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;`;
                document.body.appendChild(p);
                const angle = (Math.PI * 2 * i) / 30;
                const dist = 100 + Math.random() * 200;
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0)`, opacity: 0 }
                ], { duration: 1000 + Math.random() * 1000, easing: 'cubic-bezier(0, 0.5, 0.5, 1)' });
                setTimeout(() => p.remove(), 2000);
            }
        }

        letterOverlay.addEventListener('click', (e) => {
            if (e.target === letterOverlay) letterOverlay.classList.remove('visible');
        });
    </script>
</body>
</html>
