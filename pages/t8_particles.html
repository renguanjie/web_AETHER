<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子情书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a12; overflow: hidden; }
        canvas { display: block; }
        .back-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            padding: 6px 14px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px; transition: all 0.3s;
        }
        .back-btn:hover { color: #D4AF37; }
        #textReveal {
            position: fixed; bottom: 15%; left: 50%; transform: translateX(-50%);
            font-family: 'Georgia', 'Noto Serif SC', serif;
            font-size: clamp(20px, 5vw, 36px); color: #fff;
            letter-spacing: 6px; text-align: center;
            opacity: 0; transition: opacity 2s ease; pointer-events: none;
            text-shadow: 0 0 30px rgba(255,255,255,0.3); z-index: 10;
        }
        #textReveal.visible { opacity: 1; }
        .hint {
            position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.3); font-size: 13px; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <a href="portal.html" class="back-btn">&larr; 返回门户</a>
    <canvas id="c"></canvas>
    <div id="textReveal">你就是我的光</div>
    <div class="hint" id="hint">移动鼠标，拨动粒子</div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const textReveal = document.getElementById('textReveal');
        const hint = document.getElementById('hint');
        let W, H, particles = [], mouseX = -9999, mouseY = -9999;
        let lastMove = 0, textShown = false;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const pCount = window.innerWidth < 768 ? 200 : 500;
        for (let i = 0; i < pCount; i++) {
            const hue = Math.random()*60+180;
            particles.push({
                x: Math.random()*W, y: Math.random()*H,
                vx: 0, vy: 0, r: Math.random()*2+1,
                color: `hsl(${hue},70%,${60+Math.random()*20}%)`,
                glow: `hsla(${hue},70%,60%,0.3)`,
            });
        }

        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; lastMove = Date.now(); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; lastMove = Date.now(); });
        canvas.addEventListener('touchstart', e => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });

        function animate() {
            ctx.fillStyle = 'rgba(10,10,18,0.15)'; ctx.fillRect(0, 0, W, H);
            if (Date.now()-lastMove > 3000 && !textShown) { textShown = true; textReveal.classList.add('visible'); hint.style.opacity = '0'; }

            for (const p of particles) {
                const dx = p.x-mouseX, dy = p.y-mouseY, dist = Math.hypot(dx,dy);
                if (dist < 150 && dist > 0) {
                    const f = (150-dist)/150;
                    p.vx += (dx/dist)*f*2; p.vy += (dy/dist)*f*2;
                }
                p.vx *= 0.95; p.vy *= 0.95; p.x += p.vx; p.y += p.vy;
                if (p.x<0) p.x=W; if (p.x>W) p.x=0; if (p.y<0) p.y=H; if (p.y>H) p.y=0;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.fill();
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2); ctx.fillStyle = p.glow; ctx.fill();
            }

            for (let i = 0; i < particles.length; i++) {
                for (let j = i+1; j < particles.length; j++) {
                    const d = Math.hypot(particles[i].x-particles[j].x, particles[i].y-particles[j].y);
                    if (d < 60) {
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(100,200,255,${0.15*(1-d/60)})`; ctx.lineWidth = 0.5; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
