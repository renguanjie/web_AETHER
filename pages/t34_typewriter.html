<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>打字机情书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
            background: #2c2420;
            font-family: 'Courier New', 'SF Mono', monospace;
        }
        .desk {
            max-width: 600px; margin: 0 auto; padding: 40px 20px;
        }
        .paper {
            background: #f5f0e1;
            border-radius: 4px;
            padding: 40px 36px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 0 60px rgba(0,0,0,0.03);
            position: relative;
            min-height: 80vh;
        }
        /* Ruled lines */
        .paper::before {
            content: '';
            position: absolute; inset: 40px 36px;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 27px,
                rgba(0,0,0,0.06) 27px,
                rgba(0,0,0,0.06) 28px
            );
            pointer-events: none;
        }
        /* Margin line */
        .paper::after {
            content: '';
            position: absolute; top: 40px; bottom: 40px; left: 60px;
            width: 1px; background: rgba(255,100,100,0.15);
            pointer-events: none;
        }

        /* Coffee stain */
        .coffee-stain {
            position: absolute; top: -10px; right: 20px;
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid rgba(139,90,43,0.1);
            background: radial-gradient(ellipse, rgba(139,90,43,0.05), transparent 70%);
            transform: rotate(15deg);
        }

        .letter-content {
            position: relative; z-index: 1;
            font-size: 15px; line-height: 28px;
            color: #3a3020;
        }
        .letter-content p {
            margin-bottom: 12px; min-height: 28px;
        }
        .cursor {
            display: inline-block; width: 2px; height: 18px;
            background: #3a3020; animation: blink 0.6s step-end infinite;
            vertical-align: text-bottom; margin-left: 1px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .heart-stamp {
            position: absolute; bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            border: 2px solid rgba(200,50,50,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: rgba(200,50,50,0.4);
            transform: rotate(-15deg);
            opacity: 0; transition: opacity 1s ease;
        }
        .heart-stamp.visible { opacity: 1; }

        .date-line {
            font-size: 12px; color: #888;
            margin-bottom: 20px; text-align: right;
            opacity: 0; animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .final-overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(245,240,225,0.98), rgba(200,190,170,0.99));
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .final-overlay.visible { opacity: 1; pointer-events: auto; }
        .final-text {
            font-size: clamp(18px, 4vw, 30px); color: #3a3020;
            letter-spacing: 4px; font-weight: 200; text-align: center;
            line-height: 1.8; opacity: 0; animation: rise 1.5s ease 0.5s forwards;
        }
        .final-text .pink { color: #c83232; font-weight: 500; }
        .final-sub {
            font-size: 11px; color: #888; letter-spacing: 3px; margin-top: 14px;
            opacity: 0; animation: rise 1.5s ease 1.5s forwards;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="desk">
        <div class="paper">
            <div class="coffee-stain"></div>
            <div class="date-line" id="date"></div>
            <div class="letter-content" id="letter"></div>
            <div class="heart-stamp" id="stamp">&#10084;</div>
        </div>
    </div>

    <div class="final-overlay" id="final">
        <div class="final-text">信已写完<br><span class="pink">收信人：你</span></div>
        <div class="final-sub">LETTER DELIVERED — WITH LOVE</div>
    </div>

    <script>
        var now = new Date();
        document.getElementById('date').textContent =
            now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');

        var paragraphs = [
            "你好，",
            "不知道你会不会看到这封信。我想了很久，还是决定写下来。",
            "有些话当面说不出口，只能用文字告诉你。",
            "从什么时候开始的呢？可能是在人群中注意到你的那一刻，也可能是你对我笑的那一瞬间。",
            "从那以后，我的生活好像多了一个默认设置——所有的计划里，都有你。",
            "我不善言辞，但我想让你知道：你是我遇到过最好的人。",
            "如果你愿意，我希望以后的每一封信，收信人都是你。",
            "—— 一个默默喜欢你的人",
        ];

        var letter = document.getElementById('letter');
        var pIdx = 0, cIdx = 0;

        function typeNext() {
            if (pIdx >= paragraphs.length) {
                // Done typing
                setTimeout(function() {
                    document.getElementById('stamp').classList.add('visible');
                }, 800);
                setTimeout(function() {
                    document.getElementById('final').classList.add('visible');
                }, 2500);
                return;
            }

            var p = letter.querySelector('.typed-p');
            if (!p || cIdx === 0) {
                p = document.createElement('p');
                p.className = 'typed-p';
                letter.appendChild(p);
            }

            // Remove old cursor
            var oldCursor = letter.querySelector('.cursor');
            if (oldCursor) oldCursor.remove();

            var text = paragraphs[pIdx];
            if (cIdx < text.length) {
                p.textContent = text.substring(0, cIdx + 1);
                var cursor = document.createElement('span');
                cursor.className = 'cursor';
                p.appendChild(cursor);
                cIdx++;
                setTimeout(typeNext, 40 + Math.random() * 60);
            } else {
                p.textContent = text;
                pIdx++;
                cIdx = 0;
                setTimeout(typeNext, 500 + Math.random() * 500);
            }

            // Auto scroll
            window.scrollTo(0, document.body.scrollHeight);
        }

        setTimeout(typeNext, 1500);
    </script>
</body>
</html>
