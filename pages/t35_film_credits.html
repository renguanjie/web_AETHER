<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>电影片尾字幕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #000;
            font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
            color: #fff;
        }
        .credits-wrapper {
            position: absolute; inset: 0;
            overflow: hidden;
        }
        .credits {
            position: absolute; bottom: -100%; left: 0; right: 0;
            text-align: center;
            animation: scrollCredits 35s linear forwards;
        }
        @keyframes scrollCredits {
            from { bottom: -100%; }
            to { bottom: 120%; }
        }
        .credits h2 {
            font-size: 18px; font-weight: 300;
            letter-spacing: 6px; margin: 30px 0 10px;
            color: #888; text-transform: uppercase;
        }
        .credits .name {
            font-size: 28px; font-weight: 200;
            letter-spacing: 4px; margin: 6px 0 20px;
        }
        .credits .name.pink {
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255,107,157,0.3);
        }
        .credits .name.gold {
            color: #ffd54f;
        }
        .credits .divider {
            width: 40px; height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 20px auto;
        }
        .credits .role {
            font-size: 13px; color: #666; margin: 4px 0;
        }
        .credits .thankyou {
            font-size: 14px; color: #555;
            line-height: 2; margin: 20px 0;
        }

        /* Final frame */
        .final-frame {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 2s ease;
        }
        .final-frame.visible { opacity: 1; pointer-events: auto; }
        .final-frame .text {
            font-size: clamp(20px, 5vw, 36px);
            color: #fff; letter-spacing: 6px; font-weight: 200;
            text-align: center;
            opacity: 0; animation: rise 2s ease 0.5s forwards;
        }
        .final-frame .text .pink {
            color: #ff6b9d; font-weight: 400;
        }
        .final-frame .sub {
            font-size: 12px; color: #555; letter-spacing: 4px;
            margin-top: 20px;
            opacity: 0; animation: rise 2s ease 2s forwards;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Skip button */
        .skip-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; color: #888;
            font-size: 11px; cursor: pointer;
            font-family: inherit; letter-spacing: 2px;
            z-index: 10; transition: all 0.3s ease;
        }
        .skip-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        /* Click to skip overlay */
        .skip-overlay {
            position: absolute; inset: 0; z-index: 5;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="credits-wrapper">
        <div class="skip-overlay" id="skip-overlay"></div>
        <button class="skip-btn" id="skip-btn">跳过 &#9197;</button>
        <div class="credits" id="credits">
            <div class="divider"></div>
            <h2>DIRECTED BY</h2>
            <div class="name">我</div>

            <div class="divider"></div>
            <h2>STARRING</h2>
            <div class="name pink">你</div>
            <div class="name">&amp;</div>
            <div class="name">我</div>

            <div class="divider"></div>
            <h2>SCREENPLAY</h2>
            <div class="name">命运</div>

            <div class="divider"></div>
            <h2>ORIGINAL SCORE</h2>
            <div class="name">心跳声</div>

            <div class="divider"></div>
            <h2>CINEMATOGRAPHY</h2>
            <div class="name">目光所及皆是你</div>

            <div class="divider"></div>
            <h2>VFX</h2>
            <div class="role">微笑特效 — 你</div>
            <div class="role">心动加速 — 你</div>
            <div class="role">失眠原因 — 你</div>

            <div class="divider"></div>
            <h2>MUSIC</h2>
            <div class="role">每次见你时的 BGM</div>

            <div class="divider"></div>
            <h2>PRODUCED BY</h2>
            <div class="name gold">缘分</div>

            <div class="divider"></div>
            <h2>THANKS TO</h2>
            <div class="thankyou">
                感谢你出现在我的世界里<br>
                感谢每一次微笑和回应<br>
                感谢你让我成为更好的人
            </div>

            <div class="divider"></div>
            <h2>SPECIAL THANKS</h2>
            <div class="name pink">屏幕前的你</div>

            <div class="divider"></div>
            <div style="height:60px;"></div>
        </div>
    </div>

    <div class="final-frame" id="final">
        <div class="text">这是一部<span class="pink">未完待续</span>的电影</div>
        <div class="sub">TO BE CONTINUED — BY YOU</div>
    </div>

    <script>
        var skipped = false;
        function skipToEnd() {
            if (skipped) return;
            skipped = true;
            document.getElementById('credits').style.animation = 'none';
            document.getElementById('credits').style.opacity = '0';
            document.getElementById('skip-btn').style.display = 'none';
            setTimeout(function() {
                document.getElementById('final').classList.add('visible');
            }, 500);
        }

        document.getElementById('skip-btn').addEventListener('click', skipToEnd);
        document.getElementById('skip-overlay').addEventListener('click', skipToEnd);

        // Auto show final after credits scroll
        setTimeout(function() {
            if (!skipped) skipToEnd();
        }, 37000);
    </script>
</body>
</html>
