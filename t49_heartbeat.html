<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心跳监测仪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: -apple-system, 'PingFang SC', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .monitor { text-align: center; max-width: 400px; padding: 20px; }
        .monitor-title { font-size: 11px; color: #444; letter-spacing: 3px; margin-bottom: 20px; }
        .heart-rate { font-size: 72px; font-weight: 700; color: #ff6b9d; line-height: 1; }
        .bpm { font-size: 14px; color: #555; margin-left: 4px; }
        .ecg-canvas { width: 100%; height: 120px; margin: 20px 0; border-bottom: 1px solid rgba(255,107,157,0.2); }
        .heart-icon { font-size: 48px; animation: pulse 1s ease-in-out infinite; display: inline-block; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } 45% { transform: scale(1.15); } }
        .status { font-size: 12px; color: #4caf50; margin-top: 10px; letter-spacing: 2px; }
        .diagnosis { margin-top: 30px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .diag-label { font-size: 10px; color: #666; letter-spacing: 2px; margin-bottom: 8px; }
        .diag-value { font-size: 14px; color: #ff6b9d; line-height: 1.6; }
        .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(20,10,30,0.97), rgba(0,0,0,0.99)); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .overlay.visible { opacity: 1; pointer-events: auto; }
        .overlay-text { font-size: clamp(18px, 4vw, 28px); color: #fff; letter-spacing: 4px; text-align: center; opacity: 0; animation: rise 1.5s ease 0.5s forwards; }
        .overlay-text .pink { color: #ff6b9d; }
        .overlay-sub { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 14px; opacity: 0; animation: rise 1.5s ease 1.5s forwards; }
        @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="monitor-title">HEART RATE MONITOR</div>
        <div class="heart-icon">&#10084;</div>
        <div class="heart-rate" id="heart-rate">99<span class="bpm">BPM</span></div>
        <canvas class="ecg-canvas" id="ecg"></canvas>
        <div class="status">&#9679; 监测中</div>
        <div class="diagnosis">
            <div class="diag-label">诊断结果</div>
            <div class="diag-value">心率异常升高，原因：正在想你<br>建议：立即联系对方</div>
        </div>
    </div>
    <div class="overlay" id="overlay">
        <div class="overlay-text">心跳不会说谎<br><span class="pink">每一次跳动都是喜欢你</span></div>
        <div class="overlay-sub">HEARTBEAT DETECTED — CAUSE: YOU</div>
    </div>
    <script>
        var canvas = document.getElementById('ecg'), ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        var x = 0, y = h / 2, speed = 2;
        function drawECG() {
            ctx.strokeStyle = 'rgba(255,107,157,0.8)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(x, y);
            x += speed;
            var phase = (x % 120) / 120;
            if (phase < 0.05) y = h / 2;
            else if (phase < 0.1) y = h / 2 - (phase - 0.05) / 0.05 * 8;
            else if (phase < 0.15) y = h / 2 + ((phase - 0.1) / 0.05) * 50;
            else if (phase < 0.2) y = h / 2 - 50 + ((phase - 0.15) / 0.05) * 55;
            else if (phase < 0.25) y = h / 2 + 5 + ((phase - 0.2) / 0.05) * 20;
            else if (phase < 0.35) y = h / 2 + 25 - ((phase - 0.25) / 0.1) * 25;
            else y = h / 2 + Math.sin(x * 0.1) * 2;
            ctx.lineTo(x, y); ctx.stroke();
            if (x > w) { x = 0; ctx.clearRect(0, 0, w, h); }
            requestAnimationFrame(drawECG);
        }
        drawECG();
        var rateEl = document.getElementById('heart-rate');
        setInterval(function() { rateEl.innerHTML = (95 + Math.floor(Math.random() * 10)) + '<span class="bpm">BPM</span>'; }, 2000);
        setTimeout(function() { document.getElementById('overlay').classList.add('visible'); }, 6000);
    </script>
</body>
</html>
