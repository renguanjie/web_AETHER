<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空下的名字</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        .back-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            padding: 6px 14px; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px; transition: all 0.3s;
        }
        .back-btn:hover { color: #D4AF37; }
        .hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 2px;
            z-index: 10; pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <a href="portal.html" class="back-btn">&larr; 返回门户</a>
    <canvas id="c"></canvas>
    <div class="hint" id="hint">长按屏幕，连接星辰</div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        let W, H, stars = [], mouseDown = false, mouseX = 0, mouseY = 0;
        let heartFormed = false, heartReveal = 0;

        const heartTargets = [];
        for (let i = 0; i < 60; i++) {
            const t = (Math.PI * 2 * i) / 60;
            heartTargets.push({ x: 16 * Math.pow(Math.sin(t), 3), y: -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)) });
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const count = window.innerWidth < 768 ? 200 : 500;
            for (let i = 0; i < count; i++) {
                const s = {
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.5 + 0.3,
                    baseOp: Math.random() * 0.6 + 0.2,
                    speed: Math.random() * 0.01 + 0.003,
                    phase: Math.random() * Math.PI * 2,
                    dx: (Math.random()-0.5) * 0.3,
                    dy: (Math.random()-0.5) * 0.3,
                };
                if (i < heartTargets.length) {
                    const scale = Math.min(W, H) * 0.015;
                    s.targetX = W/2 + heartTargets[i].x * scale;
                    s.targetY = H/2 + heartTargets[i].y * scale;
                    s.isHeart = true;
                }
                stars.push(s);
            }
        }

        function animate(t) {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createRadialGradient(W/2 + (mouseX-W/2)*0.02, H/2 + (mouseY-H/2)*0.02, 0, W/2, H/2, Math.max(W,H));
            grad.addColorStop(0, '#0a0520'); grad.addColorStop(0.5, '#050215'); grad.addColorStop(1, '#000005');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

            for (const s of stars) {
                const twinkle = Math.sin(t * s.speed + s.phase) * 0.3 + 0.7;
                let px = s.x + s.dx * (mouseX - W/2) * 0.001;
                let py = s.y + s.dy * (mouseY - H/2) * 0.001;
                ctx.beginPath(); ctx.arc(px, py, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.baseOp * twinkle})`; ctx.fill();
                if (s.r > 1) {
                    ctx.beginPath(); ctx.arc(px, py, s.r*3, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(180,160,255,${s.baseOp * twinkle * 0.1})`; ctx.fill();
                }
            }

            if (mouseDown) {
                const threshold = 150;
                const near = [];
                for (const s of stars) {
                    const sx = s.x + s.dx * (mouseX-W/2) * 0.001;
                    const sy = s.y + s.dy * (mouseY-H/2) * 0.001;
                    if (Math.hypot(sx-mouseX, sy-mouseY) < threshold) near.push({x:sx, y:sy});
                }
                for (let i = 0; i < near.length; i++) {
                    for (let j = i+1; j < near.length; j++) {
                        const d = Math.hypot(near[i].x - near[j].x, near[i].y - near[j].y);
                        if (d < 200) {
                            ctx.beginPath(); ctx.moveTo(near[i].x, near[i].y); ctx.lineTo(near[j].x, near[j].y);
                            ctx.strokeStyle = `rgba(180,160,255,${0.3*(1-d/200)})`; ctx.lineWidth = 1; ctx.stroke();
                        }
                    }
                }
                if (near.length > 20 && !heartFormed) { heartFormed = true; heartReveal = 0; hint.style.opacity = '0'; }
                if (heartFormed) {
                    heartReveal = Math.min(heartReveal + 0.02, 1);
                    const scale = Math.min(W, H) * 0.015;
                    ctx.globalAlpha = heartReveal;
                    for (let i = 0; i < heartTargets.length - 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(W/2 + heartTargets[i].x * scale, H/2 + heartTargets[i].y * scale);
                        ctx.lineTo(W/2 + heartTargets[i+1].x * scale, H/2 + heartTargets[i+1].y * scale);
                        ctx.strokeStyle = `rgba(255,100,150,${0.6*heartReveal})`; ctx.lineWidth = 2;
                        ctx.shadowColor = 'rgba(255,100,150,0.5)'; ctx.shadowBlur = 10; ctx.stroke();
                        ctx.shadowBlur = 0;
                    }
                    ctx.globalAlpha = 1;
                }
            }
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', e => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; });
        canvas.addEventListener('touchend', () => mouseDown = false);
        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
